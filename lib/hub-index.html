<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Claude sessions</title>
<!-- The menu-bar widget's Claude starburst (terracotta), tiled on the hub's
     slate and wearing a teal live-dot — the hub's own mark. -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23191a21'/%3E%3Cg stroke='%23d97757' stroke-width='5.5' stroke-linecap='round'%3E%3Cpath d='M32 32 32 9'/%3E%3Cpath d='M32 32 46 14'/%3E%3Cpath d='M32 32 55 27'/%3E%3Cpath d='M32 32 50 44'/%3E%3Cpath d='M32 32 37 55'/%3E%3Cpath d='M32 32 21 52'/%3E%3Cpath d='M32 32 10 42'/%3E%3Cpath d='M32 32 9 25'/%3E%3Cpath d='M32 32 18 11'/%3E%3C/g%3E%3Ccircle cx='51' cy='51' r='6' fill='%234fb6a6' stroke='%23191a21' stroke-width='2.5'/%3E%3C/svg%3E">
<style>
/* V6 "FLEET" index — the merged board. V3's state-grouped spine (Needs you →
   Working → Ended), V5's query grammar + live peek panes, V1's table density,
   keyboard cursor + hover preview, and explicit sort. Two densities:
   peeks (panes with live tails) and table (k9s rows, preview on hover/cursor). */
:root {
    color-scheme: dark;
    --bg: #171922; --panel: #1d2029; --well: #1a1d25; --sel: #2a2e3a;
    --edge: rgba(195,203,228,.13); --edge2: rgba(195,203,228,.25);
    --text: #eceef5; --dim: #a0a6b9; --faint: #656c81;
    --you: oklch(0.76 0.15 268); --claude: oklch(0.76 0.14 180);
    --tool: #e2b05b; --err: #ea8578; --add: oklch(0.75 0.14 142);
    --meta: oklch(0.74 0.11 305);
    --you-soft: color-mix(in srgb, var(--you) 10%, transparent);
    --err-soft: color-mix(in srgb, var(--err) 10%, transparent);
    --sans: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --r: 10px; --tb-h: 44px;
    --ease: cubic-bezier(.2,0,0,1); --t-fast: 130ms; --t-slow: 260ms;
    --shadow: 0 10px 32px -12px rgba(0,0,0,.6);
}
:root.light {
    color-scheme: light;
    --bg: #f2f3f7; --panel: #fafbfd; --well: #ffffff; --sel: #e5e8f0;
    --edge: rgba(25,30,48,.13); --edge2: rgba(25,30,48,.26);
    --text: #1a1c23; --dim: #545a6b; --faint: #8b91a2;
    --you: oklch(0.46 0.16 268); --claude: oklch(0.46 0.15 180);
    --tool: #7e5d0e; --err: #b23f33; --add: oklch(0.46 0.14 142);
    --meta: oklch(0.46 0.13 305);
    --shadow: 0 10px 32px -12px rgba(30,40,70,.24);
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text); font: 14.5px/1.55 var(--sans); }
button, select { font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
:focus-visible { outline: 2px solid var(--you); outline-offset: 2px; }
:focus:not(:focus-visible) { outline: none; }
.icon { width: 15px; height: 15px; stroke: currentColor; stroke-width: 1.75;
    stroke-linecap: round; stroke-linejoin: round; fill: none; flex: none; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }

.topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--tb-h); z-index: 60;
    display: flex; align-items: center; gap: 10px; padding: 0 14px;
    background: color-mix(in srgb, var(--bg) 90%, transparent); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--edge); }
.tb-brand { font: 650 14px var(--sans); }
.tb-host { font: 11px var(--mono); color: var(--faint); }
.tb-sp { flex: 1; }
.chip { display: inline-flex; align-items: center; gap: 6px; height: 24px; padding: 0 10px;
    border-radius: 999px; font: 700 11px var(--mono); }
.chip .pulse { width: 7px; height: 7px; border-radius: 50%; background: currentColor; position: relative; }
.chip.live { color: var(--claude); background: color-mix(in srgb, var(--claude) 12%, transparent); }
.chip.live .pulse::after { content: ''; position: absolute; inset: -4px; border-radius: 50%;
    border: 1.5px solid currentColor; opacity: 0; animation: pulse 2s var(--ease) infinite; }
@keyframes pulse { 0% { transform: scale(.4); opacity: .8; } 70%,100% { transform: scale(1.1); opacity: 0; } }
.chip.turn { color: var(--you); background: var(--you-soft); }
.tbtn { height: 30px; display: inline-flex; align-items: center; gap: 6px; padding: 0 11px;
    border: 1px solid var(--edge); border-radius: 999px; background: transparent; color: var(--dim);
    font: 600 12px var(--sans); transition: all var(--t-fast) var(--ease); }
.tbtn:hover { background: var(--sel); color: var(--text); border-color: var(--edge2); }
select.tbtn { appearance: none; padding-right: 22px;
    background-image: linear-gradient(45deg, transparent 50%, currentColor 50%), linear-gradient(135deg, currentColor 50%, transparent 50%);
    background-position: calc(100% - 14px) 55%, calc(100% - 10px) 55%; background-size: 4px 4px; background-repeat: no-repeat; }

main { max-width: 1120px; margin: 0 auto; padding: calc(var(--tb-h) + 22px) 18px 70px; }
.mh-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 22px; }
h1 { font: 650 21px/1.2 var(--sans); letter-spacing: -.014em; margin: 0; }
.mh-line { font: 12px var(--mono); color: var(--dim); display: flex; flex-wrap: wrap; gap: 4px 18px;
    font-variant-numeric: tabular-nums; align-items: center; }
.mh-line b { color: var(--text); font-weight: 700; }
.meter { display: inline-flex; align-items: center; gap: 7px; }
.meter .bar { width: 64px; height: 5px; border-radius: 999px; border: 1px solid var(--edge);
    background: var(--sel); overflow: hidden; }
.meter .bar i { display: block; height: 100%; border-radius: 999px; background: var(--dim); }
.meter.warn .bar i { background: var(--tool); } .meter.warn b { color: var(--tool); }
.meter.hot .bar i { background: var(--err); } .meter.hot b { color: var(--err); }

/* query bar */
.qbar { position: relative; margin-top: 16px; }
.qbar > .icon { position: absolute; left: 12px; top: 50%; translate: 0 -50%; color: var(--faint); }
#fq { width: 100%; height: 36px; background: var(--well); border: 1px solid var(--edge);
    color: var(--text); border-radius: 999px; padding: 0 96px 0 36px; font: 13px var(--sans); }
#fq::placeholder { color: var(--faint); }
#fq:focus { outline: none; border-color: var(--you); box-shadow: 0 0 0 3px var(--you-soft); }
.qstat { position: absolute; right: 14px; top: 50%; translate: 0 -50%; font: 10.5px var(--mono);
    color: var(--faint); pointer-events: none; font-variant-numeric: tabular-nums; }
.qhint { margin-top: 6px; font: 10.5px var(--mono); color: var(--faint); }
.qhint code { background: var(--sel); border-radius: 4px; padding: 1px 6px; cursor: pointer; }
.qhint code:hover { color: var(--text); }
.p-hit { margin: 0 13px 9px; padding: 4px 10px; border-radius: 6px;
    background: color-mix(in srgb, var(--tool) 10%, transparent);
    font: 11px var(--mono); color: var(--dim); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; width: fit-content; max-width: calc(100% - 26px); }
.p-hit mark { background: rgba(226,176,91,.3); color: var(--text); border-radius: 2px; }

/* ---------------- peeks density (V5) ---------------- */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; margin-top: 18px; }
.pane { display: flex; flex-direction: column; text-decoration: none; color: inherit;
    background: var(--panel); border: 1px solid var(--edge); border-radius: var(--r); overflow: hidden;
    transition: border-color var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease); }
.pane:hover { border-color: var(--edge2); box-shadow: var(--shadow); }
/* Rows whose transcript this hub can't read (codex). They carry no href, so
   say so on hover instead of looking clickable and doing nothing. */
.noopen { cursor: default; opacity: .72; }
.noopen:hover { border-color: var(--edge); box-shadow: none; }
.pane.cur { outline: 2px solid var(--you); outline-offset: 2px; }
.pane.turn { border-color: color-mix(in srgb, var(--you) 35%, transparent);
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--you) 22%, transparent); }
.p-head { display: flex; align-items: baseline; gap: 9px; padding: 9px 13px;
    border-bottom: 1px solid var(--edge); background: var(--well); }
.p-st { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); flex: none; align-self: center; position: relative; }
.pane.turn .p-st { background: var(--you); }
.pane.working .p-st { background: var(--claude); }
.pane.working .p-st::after { content: ''; position: absolute; inset: -4px; border-radius: 50%;
    border: 1.5px solid var(--claude); opacity: 0; animation: pulse 2s var(--ease) infinite; }
.p-title { font: 650 14.5px var(--sans); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.p-model { flex: none; font: 700 10px var(--mono); letter-spacing: .06em; text-transform: uppercase;
    color: var(--claude); border: 1px solid color-mix(in srgb, var(--claude) 30%, transparent);
    border-radius: 4px; padding: 1px 6px; }
.p-state { flex: none; font: 600 11.5px var(--sans); }
.pane.turn .p-state { color: var(--you); }
.pane.working .p-state { color: var(--claude); }
.pane.ended .p-st { background: var(--faint); }
.pane.ended .p-state { color: var(--faint); font-weight: 600; }
.pane.ended .p-tail { opacity: .8; min-height: 0; }
.p-el { flex: none; margin-left: auto; font: 10.5px var(--mono); color: var(--faint); font-variant-numeric: tabular-nums; }
.p-tail { flex: 1; padding: 8px 13px 10px; font: 11.5px/1.65 var(--mono); min-height: 108px;
    display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; position: relative; }
.pane.turn .p-tail { min-height: 0; }
.p-tail::before { content: ''; position: absolute; left: 0; right: 0; top: 0; height: 26px;
    background: linear-gradient(var(--panel), transparent); pointer-events: none; z-index: 1; }
.p-line { display: flex; gap: 8px; color: var(--dim); white-space: nowrap; overflow: hidden; }
.p-line .g { flex: none; width: 2ch; text-align: center; }
.p-line .g.u { color: var(--you); font-weight: 700; }
.p-line .g.a { color: var(--claude); }
.p-line .g.t { color: var(--tool); }
.p-line .g.e { color: var(--faint); }
.p-line .tx { overflow: hidden; text-overflow: ellipsis; }
.p-line .tx b { color: var(--tool); font-weight: 700; }
.p-line.fresh { animation: fresh var(--t-slow) var(--ease); }
@keyframes fresh { from { opacity: 0; translate: 0 5px; } }
.p-line.cursorline .tx::after { content: '▋'; color: var(--claude); animation: blink 1.1s steps(1) infinite; margin-left: 2px; }
@keyframes blink { 50% { opacity: 0; } }
.p-wait { color: var(--faint); font-style: italic; }
.p-wait b { color: var(--you); font-style: normal; font-weight: 700; }
.p-alert { display: flex; align-items: center; gap: 7px; margin: 0 13px 9px; padding: 4px 10px;
    border-radius: 6px; background: var(--err-soft); color: var(--err); font: 600 11.5px var(--sans); width: max-content; }
.p-alert .icon { width: 13px; height: 13px; }
.p-foot { display: flex; flex-wrap: wrap; gap: 3px 14px; padding: 8px 13px;
    border-top: 1px solid var(--edge); background: var(--well);
    font: 10.5px var(--mono); color: var(--faint); font-variant-numeric: tabular-nums; }
.p-foot .ctx { display: inline-flex; align-items: center; gap: 5px; }
.p-foot .ctx .bar { width: 36px; height: 4px; border-radius: 999px; background: var(--sel); overflow: hidden; }
.p-foot .ctx .bar i { display: block; height: 100%; border-radius: 999px; background: var(--dim); }
.p-foot .ctx.warn, .p-foot .ctx.warn b { color: var(--tool); } .p-foot .ctx.warn .bar i { background: var(--tool); }
.p-foot .ctx.hot { color: var(--err); } .p-foot .ctx.hot .bar i { background: var(--err); }
.p-foot .branch { color: color-mix(in srgb, var(--meta) 40%, var(--faint)); overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
.p-foot .mod { color: var(--tool); }

/* ---------------- table density (V1) ---------------- */
.tbl { border: 1px solid var(--edge); border-radius: 8px; overflow: hidden; background: var(--panel); margin-top: 10px; }
.thead, .trow { display: grid; align-items: center; gap: 10px; padding: 0 12px;
    grid-template-columns: 14px minmax(120px,1.1fr) 52px minmax(180px,2fr) 88px 56px 62px minmax(110px,1fr) 64px; }
.thead { height: 28px; font: 700 10.5px var(--mono); letter-spacing: .07em; text-transform: uppercase;
    color: var(--faint); border-bottom: 1px solid var(--edge); background: var(--well); }
.trow { min-height: 44px; text-decoration: none; border-top: 1px solid var(--edge);
    font: 12.5px var(--mono); font-variant-numeric: tabular-nums; color: var(--dim);
    transition: background var(--t-fast) var(--ease); position: relative; }
.trow:first-of-type { border-top: none; }
.trow:hover, .trow.cur { background: var(--well); }
.trow.turn { box-shadow: inset 2px 0 0 var(--you); }
.trow.working { box-shadow: inset 2px 0 0 color-mix(in srgb, var(--claude) 55%, transparent); }
.st { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); position: relative; }
.trow.turn .st { background: var(--you); }
.trow.working .st { background: var(--claude); }
.trow.working .st::after { content: ''; position: absolute; inset: -4px; border-radius: 50%;
    border: 1.5px solid var(--claude); opacity: 0; animation: pulse 2s var(--ease) infinite; }
.c-dir { font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.c-model { color: var(--dim); text-transform: lowercase; }
.c-state { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.c-state b { font-weight: 700; }
.trow.turn .c-state b { color: var(--you); } .trow.working .c-state b { color: var(--claude); }
.c-state .doing { color: var(--faint); }
.c-ctx { display: inline-flex; align-items: center; gap: 6px; }
.c-ctx .gauge { width: 40px; height: 4px; border-radius: 2px; background: var(--sel); overflow: hidden; }
.c-ctx .gauge i { display: block; height: 100%; background: var(--dim); }
.c-ctx.warn { color: var(--tool); } .c-ctx.warn .gauge i { background: var(--tool); }
.c-ctx.hot { color: var(--err); } .c-ctx.hot .gauge i { background: var(--err); }
.c-branch { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--faint); }
.c-branch .mod { color: var(--tool); }
.c-el { text-align: right; color: var(--faint); white-space: nowrap; }
.t-hit { grid-column: 2 / -1; margin: 0 0 8px; }
.t-hit .p-hit { margin: 0; }
.mcp { grid-column: 2 / -1; display: flex; align-items: center; gap: 6px; padding: 0 0 8px;
    color: var(--err); font: 600 11px var(--sans); }
.mcp .icon { width: 12px; height: 12px; }
/* hover/cursor preview — the V1 inspector idea: peek without opening */
.hpk { position: fixed; z-index: 70; width: 380px; max-width: calc(100vw - 24px); display: none;
    background: color-mix(in srgb, var(--panel) 92%, transparent); backdrop-filter: blur(8px);
    border: 1px solid var(--edge2); border-radius: var(--r);
    /* floats a full layer above the board: deep drop + ambient ring, not the card shadow */
    box-shadow: 0 24px 56px -12px rgba(0,0,0,.72), 0 4px 14px rgba(0,0,0,.38), 0 0 0 1px rgba(0,0,0,.28);
    overflow: hidden; pointer-events: none; }
:root.light .hpk { box-shadow: 0 24px 56px -12px rgba(30,40,70,.4), 0 4px 14px rgba(30,40,70,.2), 0 0 0 1px rgba(30,40,70,.08); }
.hpk.on { display: block; animation: hpkin var(--t-fast) var(--ease); }
@keyframes hpkin { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
.hpk .p-tail { min-height: 0; }
.hpk .hd { display: flex; gap: 8px; align-items: baseline; padding: 7px 13px; background: var(--well);
    border-bottom: 1px solid var(--edge); font: 700 11px var(--mono); color: var(--dim); }
.hpk .hd b { color: var(--text); }
.trow .c-model { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* View-panel option icons */
.vp-seg button { display: inline-flex; align-items: center; gap: 5px; }
.vp-seg .icon { width: 12px; height: 12px; }
.vp-seg .sw { width: 12px; height: 12px; border-radius: 4px; border: 1px solid var(--edge2);
    display: inline-flex; align-items: center; justify-content: center; flex: none; }
.vp-seg .sw i { width: 5px; height: 5px; border-radius: 50%; }

@media (max-width: 1020px) {
    .thead, .trow { grid-template-columns: 14px minmax(110px,1.1fr) minmax(170px,2fr) 88px minmax(100px,1fr) 64px; }
    .c-model, .c-cost, .c-turns, .thead span:nth-child(3), .thead span:nth-child(7) { display: none; }
    .hpk { display: none !important; }
}
@media (max-width: 720px) {
    .thead { display: none; }
    .trow { grid-template-columns: 14px 1fr auto; grid-template-rows: auto auto; row-gap: 2px; padding: 9px 12px; }
    .st { grid-row: 1; }
    .c-dir { grid-row: 1; grid-column: 2; }
    .c-el { grid-row: 1; grid-column: 3; }
    .c-ctx, .c-cost, .c-model, .c-turns { display: none; }
    .c-state { grid-row: 2; grid-column: 2 / -1; }
    .c-branch { display: none; }
}

.sec { display: flex; align-items: center; gap: 8px; margin: 26px 0 8px;
    font: 700 10.5px var(--mono); letter-spacing: .12em; text-transform: uppercase; color: var(--faint); }
.sec.you { color: var(--you); }
.sec.cl { color: var(--claude); }
.sec .n { background: var(--sel); color: var(--dim); border-radius: 999px; padding: 1px 7px; }
.sec::after { content: ''; flex: 1; height: 1px; background: var(--edge); }
.endcap { text-align: center; font: 10.5px var(--mono); letter-spacing: .1em; text-transform: uppercase;
    color: var(--faint); margin: 32px 0 0; }
.hint { text-align: center; font: 10.5px var(--mono); color: var(--faint); margin-top: 10px; }
.hint .kbd { font: 10px var(--mono); border: 1px solid var(--edge); border-radius: 3px; padding: 1px 4px; background: var(--panel); }

/* states */
.sk { border-radius: var(--r); background: linear-gradient(90deg, var(--well) 25%, var(--sel) 40%, var(--well) 60%);
    background-size: 200% 100%; animation: shimmer 1.4s linear infinite; }
@keyframes shimmer { to { background-position: -200% 0; } }
.errbanner { display: flex; align-items: center; gap: 12px; margin: 26px 0; padding: 13px 15px;
    border: 1px solid color-mix(in srgb, var(--err) 40%, transparent); border-left: 3px solid var(--err);
    border-radius: var(--r); background: var(--err-soft); }
.errbanner .icon { color: var(--err); width: 17px; height: 17px; }
.errbanner .t b { display: block; font-weight: 650; }
.errbanner .t span { color: var(--dim); font-size: 12.5px; }
.errbanner button { margin-left: auto; height: 32px; padding: 0 14px; border-radius: 999px;
    border: 1px solid var(--edge2); background: var(--panel); color: var(--text); font: 600 12.5px var(--sans); }
.emptycard { margin: 15vh auto; text-align: center; color: var(--dim); }
.emptycard .pane-ghost { width: 260px; height: 90px; margin: 0 auto; border: 1px dashed var(--edge2);
    border-radius: var(--r); display: flex; align-items: center; justify-content: center;
    font: 12px var(--mono); color: var(--faint); }
.emptycard h2 { font: 650 18px var(--sans); color: var(--text); margin: 14px 0 5px; }
.emptycard p { font-size: 13px; margin: 0 auto; max-width: 360px; }

.demo { position: fixed; left: 12px; bottom: 12px; z-index: 90; font: 10.5px var(--mono); }
.demo summary { list-style: none; cursor: pointer; color: var(--faint); background: var(--panel);
    border: 1px dashed var(--edge2); border-radius: 999px; padding: 3px 10px; }
.demo-body { position: absolute; bottom: 28px; left: 0; width: 150px; background: var(--panel);
    border: 1px dashed var(--edge2); border-radius: 8px; padding: 8px 10px;
    display: flex; flex-direction: column; gap: 5px; box-shadow: var(--shadow); color: var(--dim); }
.demo-body label { display: flex; gap: 6px; align-items: center; cursor: pointer; }
/* ===== handoff: palette skins (color-only; includes --panel for card surfaces) ===== */
:root[data-skin="tty"] { color-scheme: dark;
    --bg: #14161e; --panel: #1d212c; --well: #191c26; --sel: #2a2f3d;
    --edge: rgba(190,200,235,.17); --edge2: rgba(190,200,235,.3);
    --text: #eef1f9; --dim: #aeb7cc; --faint: #6f7994;
    --you: oklch(0.76 0.155 268); --claude: oklch(0.76 0.145 180); --tool: #e2b05b;
    --err: #ea8578; --add: oklch(0.75 0.14 142); --meta: oklch(0.74 0.11 305); }
:root[data-skin="tty"].light { color-scheme: light;
    --bg: #f6f6f7; --panel: #ecedef; --well: #f0f0f2; --sel: #e2e4e8;
    --edge: rgba(30,34,48,.16); --edge2: rgba(30,34,48,.3);
    --text: #1e2027; --dim: #545866; --faint: #82879a;
    --you: oklch(0.46 0.16 268); --claude: oklch(0.46 0.15 180); --tool: #8a6410;
    --err: #b23f33; --add: oklch(0.46 0.14 142); --meta: oklch(0.46 0.13 305); }
:root[data-skin="editorial"] { color-scheme: dark;

<script>
"use strict";
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ic = n => `<svg class="icon" aria-hidden="true"><use href="#i-${n}"/></svg>`;
const SS = { theme: 'cv-theme', dens: 'v6-density', sort: 'v6-sort' };
function applyTheme(t) {
    document.documentElement.classList.toggle('light', t === 'light');
    $('#themeBtn').innerHTML = ic(t === 'light' ? 'sun' : 'moon');
    document.querySelectorAll('#vpTheme button').forEach(b => b.setAttribute('aria-pressed', String(b.dataset.theme === t)));
    try { localStorage.setItem(SS.theme, t); } catch (e) {}
}
applyTheme((() => { try { return localStorage.getItem(SS.theme) || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'); } catch (e) { return 'dark'; } })());
$('#themeBtn').onclick = () => vt(() => applyTheme(document.documentElement.classList.contains('light') ? 'dark' : 'light'));

/* ── real data ──────────────────────────────────────────────────────────
   This page holds no session data of its own. FEED refills from
   GET /api/sessions every poll; per-session tails stream from each
   session's own GET /s/<id>/data?since=<seq> (keyed by session_id —
   never by feed position). */
const FEED = { host: '', live: [], recent: [],
    limits: { '5h': { pct: 0 }, week: { pct: 0 } },
    aggregates: { today: { sessions: 0, tokens_out: 0, cost_usd: 0 } } };
const lim = p => p >= 90 ? 'hot' : p >= 70 ? 'warn' : '';
const ctxCls = p => p < 10 ? 'hot' : p < 25 ? 'warn' : '';
const kfmt = n => { n = +n || 0; return n >= 1e6 ? (n / 1e6).toFixed(1) + 'M' : n >= 1e3 ? (n / 1e3).toFixed(n >= 1e4 ? 0 : 1) + 'K' : String(n); };
// null cost means nobody could price this model, which is not the same as free.
// Matches the menu bar, which already renders an unpriced session as '–'.
const cfmt = c => c == null ? '–' : '$' + (+c).toFixed(2);
// Only claude transcripts are readable: the hub resolves them under
// ~/.claude/projects, and the reader keys on user/assistant lines that a codex
// rollout doesn't have. Opening one would render an empty session rather than
// fail, so these rows don't link at all.
const openable = s => !s.provider || s.provider === 'claude';
const noOpenAttrs = s => openable(s) ? '' :
    ` data-noopen="1" title="${esc(s.provider)} session — transcript isn't readable here"`;
function prettyModel(id) {
    let s = String(id || '');
    if (s.includes('/')) s = s.split('/')[0];   // foreign providers ("openai/0.142.5") → provider name only
    const parts = s.replace(/^claude-/, '').split('-');
    if (!parts[0]) return '?';
    const name = parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
    const ver = parts.slice(1).filter(p => /^\d{1,2}$/.test(p)).join('.');
    return ver ? `${name} ${ver}` : name;
}
function etimeMin(raw) {   // ps etime: [[DD-]HH:]MM:SS → minutes
    if (!raw) return 9e9;
    let days = 0, rest = String(raw);
    if (rest.includes('-')) { const p = rest.split('-'); days = +p[0] || 0; rest = p[1]; }
    const t = rest.split(':').map(n => +n || 0);
    let h = 0, m = 0;
    if (t.length === 3) { h = t[0]; m = t[1]; } else if (t.length === 2) { m = t[0]; }
    return days * 1440 + h * 60 + m;
}
function fmtElapsed(raw) {
    const m = etimeMin(raw); if (m >= 9e9) return '';
    const d = Math.floor(m / 1440), h = Math.floor((m % 1440) / 60), mm = m % 60;
    return d > 0 ? `${d}d ${h}h` : h > 0 ? `${h}h ${mm}m` : `${mm}m`;
}
function relTime(iso) {
    if (!iso) return '';
    const s = Math.max(0, (Date.now() - new Date(iso).getTime()) / 1000);
    if (isNaN(s)) return '';
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
}
function cleanTitle(t) { t = (t || '').trim(); return (t && t !== '?') ? t : ''; }
function baseName(p) { p = (p || '').replace(/\/+$/, ''); const i = p.lastIndexOf('/'); return i >= 0 ? p.slice(i + 1) : p; }
const DOING = { thinking: 'thinking', responding: 'writing', tool_use: 'running tools', tool_result: 'processing' };
function adaptFeed(d) {
    FEED.host = (d.host || '').replace(/\.local$/, '');
    FEED.live = (d.live || []).map(s => Object.assign({}, s, {
        state: s.state === 'idle' ? 'idle' : 'working',
        doing: s.state_detail || DOING[s.state] || (s.state ? s.state : 'starting…'),
        ctx_remaining: (v => isNaN(v) ? null : v)(parseInt(s.ctx_remaining, 10)),
        cost_usd: s.cost_usd == null ? null : +s.cost_usd, turns: +s.turns || 0,
        output_tokens: kfmt(s.output_tokens),
        git_modified: +s.git_modified || 0,
        elapsed: fmtElapsed(s.elapsed), _ageMin: etimeMin(s.elapsed),
        cwd_short: cleanTitle(s.tab_title) || s.cwd_short || baseName(s.cwd) || '(session)',
        model: prettyModel(s.model),
    }));
    const liveIds = new Set(FEED.live.map(s => s.session_id));
    FEED.recent = (d.recent || [])
        .filter(r => r.session_id && !liveIds.has(r.session_id))   // a live session's log is also the freshest history file
        .filter(r => (r.cwd_short || r.project) !== 'subagents')   // sub-agent transcripts aren't sessions (scan-side fix waits on the provider work landing)
        .slice(0, 12).map(s => Object.assign({}, s, {
        state: 'ended', cost_usd: s.cost_usd == null ? null : +s.cost_usd, turns: +s.turns || 0,
        model: prettyModel(s.model), git_branch: '',
        ago: relTime(s.modified),
        _ageMin: s.modified ? Math.max(0, (Date.now() - new Date(s.modified).getTime()) / 60000) : 9e9,
        cwd_short: s.cwd_short || '(session)',
    }));
    FEED.limits = { '5h': (d.limits && d.limits['5h']) || { pct: 0 }, week: (d.limits && d.limits.week) || { pct: 0 } };
    const ag = (d.aggregates || {}).today || {};
    FEED.aggregates = { today: { sessions: +ag.sessions || 0, tokens_out: kfmt(ag.turns != null ? ag.tokens_out : 0), cost_usd: +ag.cost_usd || 0 } };
}

/* density + sort, persisted */
let density = (() => { try { return localStorage.getItem(SS.dens) || 'peeks'; } catch (e) { return 'peeks'; } })();
let sortBy = (() => { try { return localStorage.getItem(SS.sort) || 'urgency'; } catch (e) { return 'urgency'; } })();
let curQ = '';
let cursor = -1; // keyboard selection over rendered items

function densLabel() { $('#densBtn').innerHTML = density === 'peeks' ? ic('rows') + 'table' : ic('grid') + 'peeks'; }
$('#densBtn').onclick = () => {
    density = density === 'peeks' ? 'table' : 'peeks';
    try { localStorage.setItem(SS.dens, density); } catch (e) {}
    densLabel(); vt(() => renderBoard(curQ));
};
$('#sortSel').value = sortBy;
$('#sortSel').onchange = () => { sortBy = $('#sortSel').value; try { localStorage.setItem(SS.sort, sortBy); } catch (e) {} renderBoard(curQ); };

/* peek-tail lines */
function lineFor(r) {
    if (!r) return null;
    if (r.role === 'user') return { g: '❯', c: 'u', tx: String(r.text || '').replace(/<[^>]+>/g, ' ').trim().slice(0, 120) };
    if (r.role === 'assistant') return { g: '⏺', c: 'a', tx: String(r.text || '').replace(/[#*`>]/g, '').trim().slice(0, 120) };
    if (r.role === 'tools') { const t = r.tools[0];
        return { g: '⏵', c: 't', tx: `<b>${esc(t.name)}</b> ${esc((t.preview || (t.input && t.input.command) || '').slice(0, 100))}`, html: true }; }
    return { g: '·', c: 'e', tx: String(r.text || '').slice(0, 100) };
}
/* Tails stream from each session's own transcript endpoint, keyed strictly by
   session_id. Prime = probe total_records via an impossible ?since, then fetch
   the last slice; after that ?since=<lastSeq> is incremental. */
const tails = {};                     // sid → { src: [lines], lastSeq, loading }
const TAIL_KEEP = 40, TAIL_PRIME = 12;
function ingestTail(sid, recs) {
    const t = tails[sid]; if (!t) return;
    t.loading = false;
    for (const r of recs || []) {
        if (r.seq <= t.lastSeq) continue;
        t.lastSeq = r.seq;
        const l = lineFor(r); if (l) { l.seq = r.seq; t.src.push(l); }   // seq travels so query hits can deep-link
    }
    if (t.src.length > TAIL_KEEP) t.src = t.src.slice(-TAIL_KEEP);
}
/* SWR cache: tails persist in localStorage so a reopen (or a hover repeat)
   paints instantly from stale data, then one cheap ?since revalidate catches
   up. The cache is a placeholder, never a TTL bet — every prime revalidates. */
const TAILCACHE = 'hub-tail-v2:';   // v2: tail lines carry seq for deep links
function loadTailCache(sid) {
    try { const v = JSON.parse(localStorage.getItem(TAILCACHE + sid)); return v && Array.isArray(v.src) ? v : null; }
    catch (e) { return null; }
}
function saveTailCache(sid) {
    const t = tails[sid]; if (!t || !t.src.length) return;
    try { localStorage.setItem(TAILCACHE + sid, JSON.stringify({ lastSeq: t.lastSeq, src: t.src.slice(-TAIL_KEEP) })); } catch (e) {}
}
function pruneTailCache() {
    const keep = new Set(FEED.live.concat(FEED.recent).map(s => TAILCACHE + s.session_id));
    try {
        for (let i = localStorage.length - 1; i >= 0; i--) {
            const k = localStorage.key(i);
            if (k && k.startsWith('hub-tail-v') && !keep.has(k)) localStorage.removeItem(k);   // also sweeps old cache versions
        }
    } catch (e) {}
}
async function primeTail(sid) {
    if (!sid || tails[sid]) return;
    const cached = loadTailCache(sid);
    tails[sid] = { src: cached ? cached.src : [], lastSeq: cached ? cached.lastSeq : 0, loading: true };
    if (cached) refreshTailDOM(sid);            // stale immediately…
    try {
        let from = tails[sid].lastSeq;
        if (!cached) {
            const probe = await (await fetch(`/s/${encodeURIComponent(sid)}/data?since=2000000000`, { cache: 'no-store' })).json();
            from = Math.max(0, ((probe.meta && probe.meta.total_records) || 0) - TAIL_PRIME);
        }
        const d = await (await fetch(`/s/${encodeURIComponent(sid)}/data?since=${from}`, { cache: 'no-store' })).json();
        ingestTail(sid, d.records);
        saveTailCache(sid);
        refreshTailDOM(sid);                     // …revalidated after
    } catch (e) { tails[sid].loading = false; }
}
function refreshTailDOM(sid) {
    const s = FEED.live.find(x => x.session_id === sid) || FEED.recent.find(x => x.session_id === sid);
    if (!s) return;
    const el = document.querySelector(`[data-tail="${sid}"]`);
    if (el) {
        const lines = tailLinesFor(s);
        el.innerHTML = lines.map((l, i) => lineHTML(l, s.state === 'working' && i === lines.length - 1 ? ' cursorline fresh' : '')).join('');
    }
    if (hpkSid === sid) {
        const row = document.querySelector(`[data-peek][data-sid="${sid}"]`);
        if (row) showPeek(row);
    }
}
function tailLinesFor(s) {
    const t = tails[s.session_id];
    if (!t) return [];
    if (s.state === 'idle') return t.src.slice(Math.max(0, t.src.length - 2));
    if (s.state === 'ended') return t.src.slice(Math.max(0, t.src.length - 3));
    return t.src.slice(Math.max(0, t.src.length - 5));
}
const lineHTML = (l, extra) =>
    `<div class="p-line${extra || ''}"><span class="g ${l.c}">${l.g}</span><span class="tx">${l.html ? l.tx : esc(l.tx)}</span></div>`;

/* ---------------- peeks density ---------------- */
function paneHTML(s, hit) {
    const yourTurn = s.state === 'idle';
    const kind = yourTurn ? 'turn' : 'working';
    let tail;
    if (yourTurn) {
        tail = tailLinesFor(s).map(l => lineHTML(l)).join('') +
            `<div class="p-line p-wait"><span class="g u">❯</span><span class="tx"><b>your turn</b>${s.last_prompt ? ` — last: ${esc(s.last_prompt.slice(0, 90))}…` : ''}</span></div>`;
    } else {
        const lines = tailLinesFor(s);
        tail = lines.map((l, i) => lineHTML(l, i === lines.length - 1 ? ' cursorline' : '')).join('');
    }
    return `<a class="pane ${kind}${openable(s) ? '' : ' noopen'}"${openable(s) ? ` href="/s/${encodeURIComponent(s.session_id)}${hit && hit.seq ? `#r${hit.seq}&q=${encodeURIComponent(hit.w)}` : ''}"` : ''}${noOpenAttrs(s)} data-sid="${esc(s.session_id)}" data-screen-label="session ${esc(s.cwd_short)}">` +
        `<div class="p-head"><span class="p-st"></span><span class="p-title">${esc(s.cwd_short)}</span>` +
        `<span class="p-model">${esc(s.model)}</span>` +
        `<span class="p-state">${yourTurn ? 'your turn' : 'working'}</span>` +
        `<span class="p-el">${esc(s.elapsed)}</span></div>` +
        `<div class="p-tail" data-tail="${esc(s.session_id)}">${tail}</div>` +
        (hit ? hitHTML(hit) : '') +
        (s.mcp_down ? `<div class="p-alert">${ic('alert')}MCP down: ${esc(s.mcp_down)}</div>` : '') +

let VDIR = null;
const save = (k, v) => { try { localStorage.setItem(k, v); } catch (e) {} };
const load = (k, d) => { try { const v = localStorage.getItem(k); return v == null ? d : v; } catch (e) { return d; } };
function seg(sel, val, attr) {
    document.querySelectorAll(sel + ' button').forEach(b => b.setAttribute('aria-pressed', String(b.dataset[attr] === val)));
}
function applyDir(name) {
    const d = DIRECTIONS[name] || DIRECTIONS.fleet; VDIR = d;
    document.documentElement.dataset.dir = name;
    const ss = $('#sortSel'); if (ss) ss.style.display = d.sort ? '' : 'none';
    const db = $('#densBtn'); if (db) db.style.display = d.layout === 'auto' ? '' : 'none';
    seg('#vpDir', name, 'dir');
    const hint = $('#vpDirHint'); if (hint) hint.textContent = d.hint;
    save('hx-idir', name);
    if (mode === 'normal') render();
}
function applyPalette(skin) {
    if (skin === 'native') delete document.documentElement.dataset.skin;
    else document.documentElement.dataset.skin = skin;
    seg('#vpSkin', skin, 'skin'); save('cc-skin', skin);
}
function applyTextSize(px) {
    document.documentElement.style.setProperty('--zoom', (px / 14.5).toFixed(3));
    const v = $('#vpFsVal'); if (v) v.textContent = px;
    const r = $('#vpFs'); if (r) r.value = px;
    save('hx-fs', px);
}
/* view panel wiring */
/* View Transitions: soft crossfade on user-initiated look changes only —
   never on the 5s polls. No-op where unsupported or with reduced motion. */
const vt = fn => (document.startViewTransition && !matchMedia('(prefers-reduced-motion: reduce)').matches)
    ? document.startViewTransition(fn) : fn();
/* opening a result while filtering = a query that worked; remember it */
document.addEventListener('click', e => { if (curQ && e.target.closest('#board a')) pushHist(curQ); });
$('#viewBtn').onclick = () => { const p = $('#viewPanel'); const o = p.classList.toggle('open'); $('#viewBtn').setAttribute('aria-pressed', String(o)); };
document.addEventListener('click', e => {
    if (!e.target.closest('#viewPanel') && !e.target.closest('#viewBtn')) { $('#viewPanel').classList.remove('open'); $('#viewBtn').setAttribute('aria-pressed', 'false'); }
});
$('#vpDir').onclick = e => { const b = e.target.closest('button'); if (b) vt(() => applyDir(b.dataset.dir)); };
$('#vpSkin').onclick = e => { const b = e.target.closest('button'); if (b) vt(() => applyPalette(b.dataset.skin)); };
$('#vpTheme').onclick = e => { const b = e.target.closest('button'); if (b) vt(() => applyTheme(b.dataset.theme)); };
$('#vpFs').oninput = e => applyTextSize(+e.target.value);

window.setMode = setMode;
densLabel();
applyDir(load('hx-idir', 'fleet'));
applyPalette(load('cc-skin', 'native'));
applyTextSize(parseFloat(load('hx-fs', '14.5')));
setMode('loading');
pollFeed();
</script>
</body>
</html>
