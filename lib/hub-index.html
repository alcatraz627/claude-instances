<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<title>Claude sessions</title>
<!--
  The session hub's front door. Lists every Claude session running on this Mac
  (and recent ones), reachable from any device on the tailnet. Each card links
  into that session's live transcript at /s/<id>.

  Holds no data of its own: on load and every few seconds it fetches
  /api/sessions (the menu bar's own scan output, reshaped by hub-server.py) and
  re-renders. Mobile-first — this is what you open on your phone.
-->
<style>
:root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2333;
    --text: #e6edf3; --dim: #7d8590; --faint: #484f58;
    --accent: #58a6ff; --good: #3fb950; --warn: #d29922; --err: #f85149;
    --border: #30363d; --card: #161b22;
    --opus: #f0883e; --sonnet: #58a6ff; --haiku: #56d4bd;
    --shadow: 0 1px 0 rgba(0,0,0,0.3), 0 6px 18px -10px rgba(0,0,0,0.6);
}
:root.light {
    --bg: #f6f8fa; --surface: #fff; --surface2: #eef1f4;
    --text: #1f2328; --dim: #59636e; --faint: #afb8c1;
    --accent: #0969da; --good: #1a7f37; --warn: #9a6700; --err: #cf222e;
    --border: #d1d9e0; --card: #fff;
    --opus: #bc4c00; --sonnet: #0969da; --haiku: #137a6e;
    --shadow: 0 1px 2px rgba(31,35,40,0.07), 0 4px 14px -8px rgba(31,35,40,0.18);
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
    padding-bottom: env(safe-area-inset-bottom);
}
code, .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
a { color: inherit; text-decoration: none; }

/* ── Header ─────────────────────────────────────────────── */
header {
    position: sticky; top: 0; z-index: 10; background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: max(10px, env(safe-area-inset-top)) 16px 12px;
}
.h-top { display: flex; align-items: center; gap: 10px; }
.brand { font-weight: 700; font-size: 17px; display: inline-flex; align-items: baseline; gap: 8px; }
.brand .host { color: var(--dim); font-weight: 400; font-size: 13px; }
.livechip {
    font-size: 12px; font-weight: 600; color: var(--good);
    background: color-mix(in srgb, var(--good) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--good) 35%, transparent);
    border-radius: 20px; padding: 2px 10px; display: inline-flex; align-items: center; gap: 6px;
}
.livechip .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--good); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
.spacer { flex: 1; }
.iconbtn {
    width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 16px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
}
.iconbtn:active { transform: scale(0.94); }

/* rate-limit bars + today line */
.meta { margin-top: 11px; display: grid; gap: 7px; }
.rl { display: flex; align-items: center; gap: 9px; font-size: 12px; }
.rl .lbl { width: 26px; color: var(--dim); font-weight: 600; flex: none; }
.rl .track { flex: 1; height: 7px; border-radius: 4px; background: var(--surface2); overflow: hidden; }
.rl .fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
.rl .pct { width: 38px; text-align: right; font-variant-numeric: tabular-nums; color: var(--text); font-weight: 600; flex: none; }
.rl .reset { color: var(--dim); width: 92px; text-align: right; flex: none; font-variant-numeric: tabular-nums; }
.today { font-size: 12px; color: var(--dim); display: flex; flex-wrap: wrap; gap: 4px 12px; }
.today b { color: var(--text); font-weight: 600; }

/* ── Layout ─────────────────────────────────────────────── */
main { padding: 16px 16px 40px; max-width: 1180px; margin: 0 auto; }
.section-h {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--dim); margin: 22px 2px 10px; display: flex; align-items: center; gap: 8px;
}
.section-h:first-child { margin-top: 4px; }
.section-h .n { color: var(--text); background: var(--surface2); border-radius: 10px; padding: 0 8px; font-size: 11px; }
/* minmax(0,…) (not the implicit minmax(auto,…)) lets a column shrink below a
   card's min-content — without it a long nowrap path forces horizontal scroll. */
.grid { display: grid; gap: 12px; grid-template-columns: minmax(0, 1fr); }
@media (min-width: 700px) { .grid { grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); } }

/* ── Live session card ──────────────────────────────────── */
.card {
    display: block; background: var(--card); border: 1px solid var(--border);
    border-radius: 13px; padding: 13px 14px; box-shadow: var(--shadow); overflow: hidden;
    transition: border-color .12s ease, transform .12s ease;
}
.card:active { transform: scale(0.99); }
@media (hover: hover) { .card:hover { border-color: var(--accent); } }
.c-head { display: flex; align-items: center; gap: 8px; }
.model { font-weight: 700; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; flex: none; }
.model .glyph { font-size: 11px; }
.model.opus { color: var(--opus); } .model.sonnet { color: var(--sonnet); } .model.haiku { color: var(--haiku); }
.proj { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }
.elapsed { color: var(--dim); font-size: 12px; font-variant-numeric: tabular-nums; flex: none; }
.state { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; color: var(--dim); flex: 0 1 auto; min-width: 0; max-width: 11em; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.state .sdot, .state > span:not(.sdot) { overflow: hidden; text-overflow: ellipsis; }
.state .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
.state.active { color: var(--good); }
.state.active .sdot { background: var(--good); animation: pulse 1.6s infinite; }

.c-path { margin-top: 3px; font-size: 11.5px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.c-metrics { margin-top: 10px; display: flex; flex-wrap: wrap; align-items: center; gap: 7px 12px; font-size: 12.5px; }
.ctx { display: inline-flex; align-items: center; gap: 6px; font-variant-numeric: tabular-nums; }
.ctx .bar { width: 42px; height: 6px; border-radius: 3px; background: var(--surface2); overflow: hidden; }
.ctx .bar > i { display: block; height: 100%; border-radius: 3px; }
.m { display: inline-flex; align-items: center; gap: 4px; color: var(--dim); font-variant-numeric: tabular-nums; }
.m b { color: var(--text); font-weight: 600; }
.m.cost b { color: var(--warn); } .m.tok b { color: var(--good); }
.branch { color: var(--haiku); } .branch::before { content: '⎇ '; opacity: 0.8; }

.c-prompt {
    margin-top: 10px; font-size: 13px; color: var(--dim); line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.c-prompt::before { content: '❯ '; color: var(--accent); font-weight: 700; }
.c-warn { margin-top: 9px; font-size: 12px; color: var(--err); display: flex; align-items: center; gap: 6px; }

/* ── Recent rows ────────────────────────────────────────── */
.recent { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.rrow { display: flex; align-items: center; gap: 10px; padding: 11px 13px; background: var(--card); }
@media (hover: hover) { .rrow:hover { background: var(--surface2); } }
.rrow:active { background: var(--surface2); }
.rrow .rmodel { font-size: 10px; font-weight: 700; text-transform: uppercase; width: 18px; text-align: center; flex: none; }
.rrow .rproj { font-weight: 600; font-size: 14px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rrow .rmeta { color: var(--dim); font-size: 12px; flex: none; font-variant-numeric: tabular-nums; }
.rrow .chev { color: var(--faint); flex: none; }

.empty { color: var(--dim); text-align: center; padding: 30px; font-size: 14px; }
.offline { position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); background: var(--err); color: #fff; padding: 7px 16px; border-radius: 20px; font-size: 13px; box-shadow: var(--shadow); display: none; z-index: 20; }
.offline.show { display: block; }
</style>
</head>
<body>
<header>
    <div class="h-top">
        <span class="brand">Claude <span class="host" id="host">sessions</span></span>
        <span class="livechip" id="livechip" hidden><span class="pulse"></span><span id="liveN">0</span> live</span>
        <span class="spacer"></span>
        <button class="iconbtn" id="theme" title="Toggle theme" aria-label="Toggle theme">◐</button>
    </div>
    <div class="meta" id="meta"></div>
</header>

<main>
    <div id="liveWrap"></div>
    <div id="recentWrap"></div>
</main>
<div class="offline" id="offline">offline — can't reach the hub</div>

<script>
"use strict";

// ── Theme (dark default, persisted) ─────────────────────────────────────────
const root = document.documentElement;
function applyTheme(t) {
    root.classList.toggle('light', t === 'light');
    document.querySelector('meta[name=theme-color]').setAttribute('content', t === 'light' ? '#ffffff' : '#0d1117');
}
applyTheme(localStorage.getItem('hub-theme') || 'dark');
document.getElementById('theme').addEventListener('click', () => {
    const next = root.classList.contains('light') ? 'dark' : 'light';
    localStorage.setItem('hub-theme', next); applyTheme(next);
});

// ── Formatting helpers ───────────────────────────────────────────────────────
function esc(s) { return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function fmtTok(n) {
    n = +n || 0;
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(n >= 1e4 ? 0 : 1) + 'K';
    return String(n);
}
function fmtCost(n) { n = +n || 0; return n >= 100 ? '$' + n.toFixed(0) : '$' + n.toFixed(2); }
function modelClass(m) { m = (m || '').toLowerCase(); return m.includes('opus') ? 'opus' : m.includes('sonnet') ? 'sonnet' : m.includes('haiku') ? 'haiku' : ''; }
function modelGlyph(m) { m = (m || '').toLowerCase(); return m.includes('opus') ? '◆' : m.includes('sonnet') ? '●' : m.includes('haiku') ? '○' : '◇'; }
function modelName(m) { m = (m || '').toLowerCase(); return m.includes('opus') ? 'Opus' : m.includes('sonnet') ? 'Sonnet' : m.includes('haiku') ? 'Haiku' : (m || '?'); }
function sevColor(pct) { return pct >= 90 ? 'var(--err)' : pct >= 70 ? 'var(--warn)' : 'var(--good)'; }
function ctxColor(rem) { return rem < 30 ? 'var(--err)' : rem < 60 ? 'var(--warn)' : 'var(--good)'; }
function relTime(iso) {
    if (!iso) return '';
    const then = new Date(iso).getTime(); if (isNaN(then)) return '';
    const s = Math.max(0, (Date.now() - then) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
}
function countdown(epochSec) {
    if (!epochSec) return '';
    let s = (+epochSec * 1000 - Date.now()) / 1000;
    if (s <= 0) return 'now';
    const d = Math.floor(s / 86400); s -= d * 86400;
    const h = Math.floor(s / 3600); s -= h * 3600;
    const m = Math.floor(s / 60);
    if (d > 0) return `${d}d ${h}h`;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
}
const ACTIVE = new Set(['thinking', 'responding', 'tool_use']);

// ── Render ───────────────────────────────────────────────────────────────────
function renderMeta(d) {
    const L = d.limits || {}, five = L['5h'] || {}, week = L.week || {};
    const ag = (d.aggregates || {}).today || {};
    const bar = (lbl, o, reset) => {
        const pct = Math.min(100, Math.round(o.pct || 0));
        return `<div class="rl"><span class="lbl">${lbl}</span>
            <span class="track"><span class="fill" style="width:${pct}%;background:${sevColor(pct)}"></span></span>
            <span class="pct">${pct}%</span><span class="reset">${reset ? 'resets ' + countdown(reset) : ''}</span></div>`;
    };
    let html = '';
    if (five.pct != null) html += bar('5h', five, L.resets_at);
    if (week.pct != null) html += bar('7d', week, L.resets_at_weekly);
    if (ag.sessions != null) html += `<div class="today">
        <span><b>${ag.sessions || 0}</b> sessions today</span>
        <span><b>${fmtTok(ag.turns)}</b> turns</span>
        <span><b>${fmtTok(ag.tokens_out)}</b> out</span>
        <span><b>${fmtCost(ag.cost_usd)}</b></span></div>`;
    document.getElementById('meta').innerHTML = html;
}

function liveCard(s) {
    const mc = modelClass(s.model);
    const active = ACTIVE.has(s.state);
    const rem = parseInt(s.ctx_remaining, 10);
    const hasCtx = !isNaN(rem);
    const proj = esc(s.tab_title || s.cwd_short || s.cwd || '(session)');
    const stateLabel = active ? (s.state_detail ? esc(s.state.replace('_', ' ') + ': ' + s.state_detail).slice(0, 40) : esc(s.state.replace('_', ' '))) : 'idle';
    const metrics = [
        hasCtx ? `<span class="ctx" title="context remaining"><span class="bar"><i style="width:${Math.min(100, rem)}%;background:${ctxColor(rem)}"></i></span>${rem}%</span>` : '',
        s.output_tokens ? `<span class="m tok">↑<b>${fmtTok(s.output_tokens)}</b></span>` : '',
        (+s.cost_usd) ? `<span class="m cost"><b>${fmtCost(s.cost_usd)}</b></span>` : '',
        s.turns ? `<span class="m"><b>${s.turns}</b>t</span>` : '',
        (+s.subagent_count) ? `<span class="m">↳<b>${s.subagent_count}</b></span>` : '',
        s.git_branch ? `<span class="m branch">${esc(s.git_branch)}${(+s.git_modified) ? ' *' + s.git_modified : ''}</span>` : '',
    ].filter(Boolean).join('');
    return `<a class="card" href="/s/${encodeURIComponent(s.session_id)}">
        <div class="c-head">
            <span class="model ${mc}"><span class="glyph">${modelGlyph(s.model)}</span>${modelName(s.model)}</span>
            <span class="proj">${proj}</span>
            <span class="state ${active ? 'active' : ''}"><span class="sdot"></span>${stateLabel}</span>
            <span class="elapsed">${esc(s.elapsed || '')}</span>
        </div>
        ${s.cwd_short ? `<div class="c-path">${esc(s.cwd_short)}</div>` : ''}
        <div class="c-metrics">${metrics}</div>
        ${s.last_prompt ? `<div class="c-prompt">${esc(s.last_prompt)}</div>` : ''}
        ${s.mcp_down ? `<div class="c-warn">⚠ MCP down: ${esc(s.mcp_down)}</div>` : ''}
    </a>`;
}

function recentRow(r) {
    const mc = modelClass(r.model);
    return `<a class="rrow" href="/s/${encodeURIComponent(r.session_id)}">
        <span class="rmodel" style="color:var(--${mc || 'dim'})">${modelGlyph(r.model)}</span>
        <span class="rproj">${esc(r.cwd_short || '(session)')}</span>
        <span class="rmeta">${r.turns || 0}t · ${relTime(r.modified)}${(+r.cost_usd) ? ' · ' + fmtCost(r.cost_usd) : ''}</span>
        <span class="chev">›</span>
    </a>`;
}

function render(d) {
    document.getElementById('host').textContent = (d.host || '').replace(/\.local$/, '');
    const live = d.live || [], recent = (d.recent || []).filter(r => r.session_id);
    const chip = document.getElementById('livechip');
    chip.hidden = !live.length; document.getElementById('liveN').textContent = live.length;
    renderMeta(d);

    document.getElementById('liveWrap').innerHTML = live.length
        ? `<div class="section-h">Live <span class="n">${live.length}</span></div><div class="grid">${live.map(liveCard).join('')}</div>`
        : `<div class="section-h">Live</div><div class="empty">No sessions running right now.</div>`;

    document.getElementById('recentWrap').innerHTML = recent.length
        ? `<div class="section-h">Recent <span class="n">${recent.length}</span></div><div class="recent">${recent.slice(0, 30).map(recentRow).join('')}</div>`
        : '';
}

// ── Poll ─────────────────────────────────────────────────────────────────────
const offline = document.getElementById('offline');
async function poll() {
    try {
        const r = await fetch('/api/sessions', { cache: 'no-store' });
        if (!r.ok) throw new Error(r.status);
        render(await r.json());
        offline.classList.remove('show');
    } catch (e) { offline.classList.add('show'); }
}
poll();
setInterval(poll, 5000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) poll(); });
</script>
</body>
</html>
