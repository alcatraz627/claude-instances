<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#13151c">
<title>Claude sessions</title>
<!--
  The session hub's front door. Lists every Claude session running on this Mac
  (and recent ones), reachable from any device on the tailnet. Each card links
  into that session's live transcript at /s/<id>.

  Holds no data of its own: on load and every few seconds it fetches
  /api/sessions (the menu bar's own scan output, reshaped by hub-server.py) and
  re-renders. Mobile-first — this is what you open on your phone.
-->
<style>
:root {
    /* Soft blue-slate, matched to the transcript viewer for cross-surface
       consistency. --good = working, --warn = your-turn, reserved + distinct. */
    --bg: #13151c; --surface: #1b1e27; --surface2: #252935;
    --text: #e9ecf4; --dim: #9499ab; --faint: #7b8295;   /* unified with transcript (was #646a7e) */
    --accent: oklch(0.70 0.14 272); --accent2: oklch(0.70 0.14 182); --good: #5cb98a; --warn: #dcb05f; --err: #e07f72;
    --border: rgba(180,190,225,.13); --card: #1b1e27;
    --opus: #d8975a; --sonnet: var(--accent); --haiku: var(--accent2);
    --shadow: 0 1px 0 rgba(0,0,0,0.25), 0 8px 22px -12px rgba(0,0,0,0.6);
}
:root.light {
    --bg: #f4f6f9; --surface: #fff; --surface2: #e8ebf0;
    --text: #1b1d23; --dim: #686c75; --faint: #6e727c;
    --accent: oklch(0.52 0.15 272); --accent2: oklch(0.52 0.15 182); --good: #2f8a5b; --warn: #9c7320; --err: #bb5346;
    --border: rgba(20,24,40,.13); --card: #fff;
    --opus: #bb6037; --sonnet: var(--accent); --haiku: var(--accent2);
    --shadow: 0 1px 2px rgba(31,35,40,0.06), 0 6px 16px -8px rgba(31,35,40,0.16);
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
    padding-bottom: env(safe-area-inset-bottom);
}
code, .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
a { color: inherit; text-decoration: none; }
/* The `hidden` attribute is overridden by any explicit display (the chips set
   display:inline-flex), so without this they'd show "0 live" when idle. */
[hidden] { display: none !important; }

/* ── Header ─────────────────────────────────────────────── */
header {
    position: sticky; top: 0; z-index: 10; background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: max(10px, env(safe-area-inset-top)) 16px 12px;
}
.h-top { display: flex; align-items: center; gap: 10px; }
.brand { font-weight: 700; font-size: 17px; display: inline-flex; align-items: baseline; gap: 8px; }
.brand .host { color: var(--dim); font-weight: 400; font-size: 13px; }
.livechip {
    font-size: 12px; font-weight: 600; color: var(--good);
    background: color-mix(in srgb, var(--good) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--good) 35%, transparent);
    border-radius: 20px; padding: 2px 10px; display: inline-flex; align-items: center; gap: 6px;
}
.livechip .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--good); animation: pulse 2s infinite; }
/* Refreshing spinner — shows only while a background fetch is in flight >250ms */
.refresh-spin { display: inline-block; width: 14px; height: 14px; border-radius: 50%; flex: none;
    border: 2px solid var(--border); border-top-color: var(--accent); animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) { .refresh-spin { animation: none; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
.spacer { flex: 1; }
.iconbtn {
    width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 16px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
}
.iconbtn:active { transform: scale(0.94); }

/* rate-limit bars + today line */
.meta { margin-top: 11px; display: grid; gap: 7px; }
.rl { display: flex; align-items: center; gap: 9px; font-size: 12px; }
.rl .lbl { width: 26px; color: var(--dim); font-weight: 600; flex: none; }
/* Track uses --bg (a clear step darker than the --surface header) so the empty
   channel reads distinctly and the fill pops, even at low % (was --surface2,
   nearly invisible against the header). */
.rl .track { flex: 1; height: 7px; border-radius: 4px; background: var(--bg);
    overflow: hidden; box-shadow: inset 0 0 0 1px var(--border); }
/* min-width so genuinely low usage (e.g. 8%) still reads as a real bar, not an
   empty/broken track. */
.rl .fill { height: 100%; min-width: 5px; border-radius: 4px; transition: width .4s ease; }
.rl .pct { width: 38px; text-align: right; font-variant-numeric: tabular-nums; color: var(--text); font-weight: 600; flex: none; }
.rl .reset { color: var(--dim); width: 92px; text-align: right; flex: none; font-variant-numeric: tabular-nums; }
.today { font-size: 12px; color: var(--dim); display: flex; flex-wrap: wrap; gap: 4px 12px; }
.today b { color: var(--text); font-weight: 600; }

/* ── Layout ─────────────────────────────────────────────── */
main { padding: 16px 16px 40px; max-width: 1180px; margin: 0 auto; }
.section-h {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--dim); margin: 22px 2px 10px; display: flex; align-items: center; gap: 8px;
}
.section-h:first-child { margin-top: 4px; }
.section-h .n { color: var(--text); background: var(--surface2); border-radius: 10px; padding: 0 8px; font-size: 11px; }
/* minmax(0,…) (not the implicit minmax(auto,…)) lets a column shrink below a
   card's min-content — without it a long nowrap path forces horizontal scroll. */
.grid { display: grid; gap: 12px; grid-template-columns: minmax(0, 1fr); }
@media (min-width: 700px) { .grid { grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); } }

/* ── Live session card: status-first ────────────────────────── */
.card {
    display: block; position: relative; background: var(--card); border: 1px solid var(--border);
    border-left-width: 3px; border-radius: 13px; overflow: hidden; box-shadow: var(--shadow);
    transition: border-color .14s ease, transform .1s ease, box-shadow .14s ease;
}
.card:active { transform: scale(0.992); }
@media (hover: hover) { .card:hover { border-color: var(--accent); box-shadow: 0 1px 0 rgba(0,0,0,.25), 0 14px 28px -14px rgba(0,0,0,.7); } }
.card.enter { animation: cardIn .22s ease; }
@keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.card.s-working { border-left-color: var(--good); }
.card.s-waiting { border-left-color: var(--warn); }
.card.s-unknown { border-left-color: var(--faint); }
.c-body { padding: 12px 14px; }

/* status leads the card — the "what needs me" answer */
.status { display: flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; min-width: 0; }
.status .sdot { width: 8px; height: 8px; border-radius: 50%; flex: none; background: var(--faint); }
.s-working .status .label { color: var(--good); } .s-working .sdot { background: var(--good); animation: pulse 1.5s infinite; }
.s-waiting .status .label { color: var(--warn); } .s-waiting .sdot { background: var(--warn); }
.s-unknown .status .label { color: var(--dim); } .s-unknown .sdot { background: var(--faint); }
.status .label { flex: none; }
.status .detail { color: var(--dim); font-weight: 400; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.status .elapsed { margin-left: auto; color: var(--dim); font-weight: 400; font-variant-numeric: tabular-nums; flex: none; padding-left: 8px; }

.c-id { display: flex; align-items: baseline; gap: 8px; margin-top: 9px; min-width: 0; }
.model { font-weight: 700; font-size: 12px; display: inline-flex; align-items: center; gap: 5px; flex: none; }
.model .glyph { font-size: 10px; }
.model.opus { color: var(--opus); } .model.sonnet { color: var(--sonnet); } .model.haiku { color: var(--haiku); }
.proj { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }
.c-path { margin-top: 2px; font-size: 11.5px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.c-prompt {
    margin-top: 9px; font-size: 13px; color: var(--dim); line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.c-prompt::before { content: '❯ '; color: var(--accent); font-weight: 700; }

.c-metrics { margin-top: 11px; display: flex; flex-wrap: wrap; align-items: center; gap: 7px 12px; font-size: 12.5px; }
.ctx { display: inline-flex; align-items: center; gap: 6px; font-variant-numeric: tabular-nums; color: var(--dim); }
.ctx .bar { width: 42px; height: 6px; border-radius: 3px; background: var(--bg); box-shadow: inset 0 0 0 1px var(--border); overflow: hidden; }
.ctx .bar > i { display: block; height: 100%; border-radius: 3px; }
.m { display: inline-flex; align-items: center; gap: 4px; color: var(--dim); font-variant-numeric: tabular-nums; }
.m b { color: var(--text); font-weight: 600; }
/* Colour discipline: tokens (a glance-value) keep teal; cost keeps amber; the
   branch is ambient metadata, so it recedes to grey rather than competing. */
.m.cost b { color: var(--warn); } .m.tok b { color: var(--accent2); }

/* Weight tiles (design handoff §7): the same stat-tile idiom as the transcript
   viewer's masthead so the two surfaces read as one system. The handoff's token
   split-bar was tried and cut: the scan's input_tokens is non-cache input,
   which caching keeps at ~0.2% of output, so the bar renders as a constant
   single-colour stripe — decoration, not information. */
.tiles { display: flex; gap: 18px; margin-top: 11px; }
.tile { font-size: 11px; color: var(--dim); }
.tile b { color: var(--text); font-size: 14px; font-weight: 700; margin-right: 4px; font-variant-numeric: tabular-nums; }
.tile.out b { color: var(--accent2); }
.branch { color: var(--dim); } .branch::before { content: '⎇ '; opacity: 0.7; }
.c-warn { margin: 0 14px 12px; font-size: 12px; color: var(--err); display: flex; align-items: center; gap: 6px; }

/* "your turn" header chip — amber, mirrors the card status */
.turnchip {
    font-size: 12px; font-weight: 600; color: var(--warn);
    background: color-mix(in srgb, var(--warn) 15%, transparent);
    border: 1px solid color-mix(in srgb, var(--warn) 38%, transparent);
    border-radius: 20px; padding: 2px 10px; display: inline-flex; align-items: center; gap: 6px;
}
.turnchip .tdot { width: 7px; height: 7px; border-radius: 50%; background: var(--warn); }

/* ── Recent rows ────────────────────────────────────────── */
.recent { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.rrow { display: flex; align-items: center; gap: 10px; padding: 11px 13px; background: var(--card); }
@media (hover: hover) { .rrow:hover { background: var(--surface2); } }
.rrow:active { background: var(--surface2); }
.rrow .rmodel { font-size: 10px; font-weight: 700; text-transform: uppercase; width: 18px; text-align: center; flex: none; }
.rrow .rproj { font-weight: 600; font-size: 14px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rrow .rmeta { color: var(--dim); font-size: 12px; flex: none; font-variant-numeric: tabular-nums; }
.rrow .chev { color: var(--faint); flex: none; }

/* Empty state: a calm centred panel (was a bare line in a vast void). */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; min-height: 48vh; gap: 10px; color: var(--dim); }
.empty-icon { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--border);
    position: relative; opacity: 0.7; }
.empty-icon::after { content: ''; position: absolute; inset: 0; margin: auto; width: 9px; height: 9px;
    border-radius: 50%; background: var(--faint); }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text); }
.empty-sub { font-size: 13px; line-height: 1.55; color: var(--dim); max-width: 340px; }
.offline { position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); background: var(--err); color: #fff; padding: 7px 16px; border-radius: 20px; font-size: 13px; box-shadow: var(--shadow); display: none; z-index: 20; }
.offline.show { display: block; }

/* Loading skeleton — shape of the real cards/bars, shimmer until the first poll */
@keyframes skshimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }
.skcard { height: 132px; border-radius: 13px; border: 1px solid var(--border);
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 37%, var(--surface) 63%);
    background-size: 400% 100%; animation: skshimmer 1.5s ease infinite; }
.rl.sk .skbar { height: 9px; border-radius: 4px;
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 37%, var(--surface) 63%);
    background-size: 400% 100%; animation: skshimmer 1.5s ease infinite; }
.rl.sk .track { box-shadow: none; }
@media (prefers-reduced-motion: reduce) { .skcard, .rl.sk .skbar { animation: none; } }
</style>
</head>
<body>
<header>
    <div class="h-top">
        <span class="brand">Claude <span class="host" id="host">sessions</span></span>
        <span class="refresh-spin" id="refreshSpin" title="Refreshing…" hidden></span>
        <span class="livechip" id="livechip" hidden><span class="pulse"></span><span id="liveN">0</span> live</span>
        <span class="turnchip" id="turnchip" hidden><span class="tdot"></span><span id="turnN">0</span> your turn</span>
        <span class="spacer"></span>
        <button class="iconbtn" id="theme" title="Toggle theme" aria-label="Toggle theme">◐</button>
    </div>
    <div class="meta" id="meta">
        <div class="rl sk"><span class="skbar" style="width:26px"></span><span class="track"></span><span class="skbar" style="width:34px"></span></div>
        <div class="rl sk"><span class="skbar" style="width:26px"></span><span class="track"></span><span class="skbar" style="width:34px"></span></div>
    </div>
</header>

<main>
    <div id="liveWrap">
        <div class="section-h" id="liveHead" hidden>Live <span class="n" id="liveHeadN"></span></div>
        <div class="grid" id="liveGrid">
            <div class="skcard"></div><div class="skcard"></div><div class="skcard"></div>
        </div>
        <div class="empty" id="liveEmpty" hidden>
            <div class="empty-icon" aria-hidden="true"></div>
            <div class="empty-title">No sessions running</div>
            <div class="empty-sub">Live Claude Code sessions on this machine show up here.<br>Start one in a terminal and it'll appear within a few seconds.</div>
        </div>
    </div>
    <div id="recentWrap"></div>
</main>
<div class="offline" id="offline">offline — can't reach the hub</div>

<script>
"use strict";

// ── Theme (dark default, persisted) ─────────────────────────────────────────
const root = document.documentElement;
function applyTheme(t) {
    root.classList.toggle('light', t === 'light');
    document.querySelector('meta[name=theme-color]').setAttribute('content', t === 'light' ? '#ffffff' : '#13151c');
}
applyTheme(localStorage.getItem('hub-theme') || 'dark');
document.getElementById('theme').addEventListener('click', () => {
    const next = root.classList.contains('light') ? 'dark' : 'light';
    localStorage.setItem('hub-theme', next); applyTheme(next);
});

// ── Formatting helpers ───────────────────────────────────────────────────────
function esc(s) { return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function fmtTok(n) {
    n = +n || 0;
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(n >= 1e4 ? 0 : 1) + 'K';
    return String(n);
}
function fmtCost(n) { n = +n || 0; return n >= 100 ? '$' + n.toFixed(0) : '$' + n.toFixed(2); }
// Turn raw `ps etime` ([[DD-]HH:]MM:SS) into a human duration ("3d 1h" / "14h 7m"
// / "22m") instead of dumping "03-01:13:13" which reads as a broken clock.
function fmtElapsed(raw) {
    if (!raw) return '';
    let days = 0, rest = String(raw);
    if (rest.includes('-')) { const p = rest.split('-'); days = parseInt(p[0], 10) || 0; rest = p[1]; }
    const t = rest.split(':').map(n => parseInt(n, 10) || 0);
    let h = 0, m = 0;
    if (t.length === 3) { h = t[0]; m = t[1]; } else if (t.length === 2) { m = t[0]; }
    if (days > 0) return days + 'd ' + h + 'h';
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm';
}
// Titles like "?" or whitespace are junk — treat as empty so the real fallback wins.
function cleanTitle(t) { t = (t || '').trim(); return (t && t !== '?') ? t : ''; }
function modelClass(m) { m = (m || '').toLowerCase(); return m.includes('opus') ? 'opus' : m.includes('sonnet') ? 'sonnet' : m.includes('haiku') ? 'haiku' : ''; }
function modelGlyph(m) { m = (m || '').toLowerCase(); return m.includes('opus') ? '◆' : m.includes('sonnet') ? '●' : m.includes('haiku') ? '○' : '◇'; }
function modelName(m) { m = (m || '').toLowerCase(); return m.includes('opus') ? 'Opus' : m.includes('sonnet') ? 'Sonnet' : m.includes('haiku') ? 'Haiku' : (m || '?'); }
function sevColor(pct) { return pct >= 90 ? 'var(--err)' : pct >= 70 ? 'var(--warn)' : 'var(--good)'; }
function ctxColor(rem) { return rem < 30 ? 'var(--err)' : rem < 60 ? 'var(--warn)' : 'var(--good)'; }
function relTime(iso) {
    if (!iso) return '';
    const then = new Date(iso).getTime(); if (isNaN(then)) return '';
    const s = Math.max(0, (Date.now() - then) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
}
function countdown(epochSec) {
    if (!epochSec) return '';
    let s = (+epochSec * 1000 - Date.now()) / 1000;
    if (s <= 0) return 'now';
    const d = Math.floor(s / 86400); s -= d * 86400;
    const h = Math.floor(s / 3600); s -= h * 3600;
    const m = Math.floor(s / 60);
    if (d > 0) return `${d}d ${h}h`;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
}
const ACTIVE = new Set(['thinking', 'responding', 'tool_use']);

// ── Render ───────────────────────────────────────────────────────────────────
function renderMeta(d) {
    const L = d.limits || {}, five = L['5h'] || {}, week = L.week || {};
    const ag = (d.aggregates || {}).today || {};
    const bar = (lbl, o, reset) => {
        const pct = Math.min(100, Math.round(o.pct || 0));
        return `<div class="rl"><span class="lbl">${lbl}</span>
            <span class="track"><span class="fill" style="width:${pct}%;background:${sevColor(pct)}"></span></span>
            <span class="pct">${pct}%</span><span class="reset">${reset ? 'resets ' + countdown(reset) : ''}</span></div>`;
    };
    let html = '';
    if (five.pct != null) html += bar('5h', five, L.resets_at);
    if (week.pct != null) html += bar('7d', week, L.resets_at_weekly);
    if (ag.sessions != null) html += `<div class="today">
        <span><b>${ag.sessions || 0}</b> sessions today</span>
        <span><b>${fmtTok(ag.turns)}</b> turns</span>
        <span><b>${fmtTok(ag.tokens_out)}</b> out</span>
        <span><b>${fmtCost(ag.cost_usd)}</b></span></div>`;
    document.getElementById('meta').innerHTML = html;
}

// A live session is either WORKING (Claude is generating) or, since the process
// is up but idle, waiting on YOU. The second case is what needs attention, so it
// sorts to the top and wears the amber accent.
function statusOf(s) {
    if (ACTIVE.has(s.state) || s.state === 'tool_result') {
        const verb = { thinking: 'thinking', responding: 'writing', tool_use: 'running tools', tool_result: 'processing' }[s.state] || 'working';
        return { kind: 'working', label: 'Working', detail: s.state_detail || verb };
    }
    if (s.state === 'idle') return { kind: 'waiting', label: 'Your turn', detail: '' };
    // Unknown / empty / not-yet-emitted state (a booting session, a future server
    // string) — neutral, NOT counted as your-turn so it can't inflate the chip.
    return { kind: 'unknown', label: 'Starting', detail: s.state_detail || '' };
}
function baseName(p) { p = (p || '').replace(/\/+$/, ''); const i = p.lastIndexOf('/'); return i >= 0 ? p.slice(i + 1) : p; }
function liveCardInner(s) {
    const st = statusOf(s), mc = modelClass(s.model);
    const rem = parseInt(s.ctx_remaining, 10), hasCtx = !isNaN(rem);
    const path = s.cwd_short || s.cwd || '';
    // Title is the tab title or the project folder name; show the full path below
    // only when it adds something (otherwise the two lines just repeat each other).
    const titleText = cleanTitle(s.tab_title) || baseName(path) || '(session)';
    const proj = esc(titleText);
    const showPath = path && path !== titleText;
    // Weight tiles (§7): turns · tools · output. Always rendered (zeros stay
    // honest on a booting session) so card heights stay uniform in the grid.
    const tiles = `<div class="tiles">
        <span class="tile"><b>${+s.turns || 0}</b>turns</span>
        <span class="tile"><b>${+s.tool_calls || 0}</b>tools</span>
        <span class="tile out"><b>${fmtTok(s.output_tokens)}</b>↑ out</span>
    </div>`;
    const metrics = [
        hasCtx ? `<span class="ctx" title="context remaining"><span class="bar"><i style="width:${Math.min(100, rem)}%;background:${ctxColor(rem)}"></i></span>${rem}%</span>` : '',
        (+s.cost_usd) ? `<span class="m cost"><b>${fmtCost(s.cost_usd)}</b></span>` : '',
        (+s.subagent_count) ? `<span class="m">↳<b>${s.subagent_count}</b></span>` : '',
        s.git_branch ? `<span class="m branch">${esc(s.git_branch)}${(+s.git_modified) ? ' *' + s.git_modified : ''}</span>` : '',
    ].filter(Boolean).join('');
    return `<div class="c-body">
        <div class="status"><span class="sdot"></span><span class="label">${st.label}</span>${st.detail ? `<span class="detail">· ${esc(st.detail)}</span>` : ''}<span class="elapsed" title="running for ${esc(fmtElapsed(s.elapsed))}">${esc(fmtElapsed(s.elapsed))}</span></div>
        <div class="c-id"><span class="model ${mc}"><span class="glyph">${modelGlyph(s.model)}</span>${modelName(s.model)}</span><span class="proj">${proj}</span></div>
        ${showPath ? `<div class="c-path">${esc(path)}</div>` : ''}
        ${s.last_prompt ? `<div class="c-prompt">${esc(s.last_prompt)}</div>` : ''}
        ${tiles}
        <div class="c-metrics">${metrics}</div>
    </div>${s.mcp_down ? `<div class="c-warn">⚠ MCP down: ${esc(s.mcp_down)}</div>` : ''}`;
}
// Keyed update: cards keep their DOM identity across the 5s poll, so nothing
// flickers, scroll doesn't jump, and an in-progress tap survives. Only changed
// cards repaint; gone sessions are removed; order follows the your-turn sort.
const cardEls = new Map();
function renderLive(live) {
    const order = { waiting: 0, working: 1, unknown: 2 };
    const sorted = live.slice().sort((a, b) => order[statusOf(a).kind] - order[statusOf(b).kind]);
    const grid = document.getElementById('liveGrid'), seen = new Set();
    grid.querySelectorAll('.skcard').forEach(el => el.remove());   // clear loading skeleton
    sorted.forEach((s, i) => {
        seen.add(s.session_id);
        const st = statusOf(s), html = liveCardInner(s);
        let el = cardEls.get(s.session_id);
        if (!el) {
            el = document.createElement('a');
            el.href = '/s/' + encodeURIComponent(s.session_id);
            el.className = 'card enter s-' + st.kind;
            el.innerHTML = html; el._html = html;
            cardEls.set(s.session_id, el);
            setTimeout(() => el.classList.remove('enter'), 320);
        } else {
            el.className = 'card s-' + st.kind;
            if (el._html !== html) { el.innerHTML = html; el._html = html; }
        }
        if (grid.children[i] !== el) grid.insertBefore(el, grid.children[i] || null);
    });
    for (const [id, el] of cardEls) if (!seen.has(id)) { el.remove(); cardEls.delete(id); }
    document.getElementById('liveHead').hidden = !sorted.length;
    document.getElementById('liveHeadN').textContent = sorted.length;
    document.getElementById('liveEmpty').hidden = !!sorted.length;
    return sorted.filter(s => statusOf(s).kind === 'waiting').length;
}

function recentRow(r) {
    const mc = modelClass(r.model);
    return `<a class="rrow" href="/s/${encodeURIComponent(r.session_id)}">
        <span class="rmodel" style="color:var(--${mc || 'dim'})">${modelGlyph(r.model)}</span>
        <span class="rproj">${esc(r.cwd_short || '(session)')}</span>
        <span class="rmeta">${r.turns || 0}t · ${relTime(r.modified)}${(+r.cost_usd) ? ' · ' + fmtCost(r.cost_usd) : ''}</span>
        <span class="chev">›</span>
    </a>`;
}

function render(d) {
    document.getElementById('host').textContent = (d.host || '').replace(/\.local$/, '');
    const live = d.live || [], recent = (d.recent || []).filter(r => r.session_id);
    renderMeta(d);
    const turnN = renderLive(live);                       // keyed; returns your-turn count

    const chip = document.getElementById('livechip');
    chip.hidden = !live.length; document.getElementById('liveN').textContent = live.length;
    const tchip = document.getElementById('turnchip');
    tchip.hidden = !turnN; document.getElementById('turnN').textContent = turnN;

    document.getElementById('recentWrap').innerHTML = recent.length
        ? `<div class="section-h">Recent <span class="n">${recent.length}</span></div><div class="recent">${recent.slice(0, 30).map(recentRow).join('')}</div>`
        : '';
}

// ── Poll, with stale-while-revalidate ────────────────────────────────────────
// The last payload is cached so reopening the page paints INSTANTLY from cache
// (no skeleton flash) — then a live fetch always runs and replaces it, so this
// never trades freshness: the cache is a placeholder, not a TTL bet (it always
// revalidates). A spinner shows while a fetch is in flight, gated by a short
// delay so fast localhost polls don't flicker it.
const offline = document.getElementById('offline');
const spin = document.getElementById('refreshSpin');
const CACHE_KEY = 'hub-cache-v1';
function setRefreshing(on) { if (spin) spin.hidden = !on; }
async function poll() {
    const t = setTimeout(() => setRefreshing(true), 250);
    try {
        const r = await fetch('/api/sessions', { cache: 'no-store' });
        if (!r.ok) throw new Error(r.status);
        const data = await r.json();
        render(data);
        try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch (e) {}
        offline.classList.remove('show');
    } catch (e) { offline.classList.add('show'); }
    finally { clearTimeout(t); setRefreshing(false); }
}
// Paint cached data immediately (clears the skeleton) before the first fetch.
try {
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
    if (cached && (cached.live || cached.recent)) render(cached);
} catch (e) {}
poll();
setInterval(poll, 5000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) poll(); });
</script>
</body>
</html>
