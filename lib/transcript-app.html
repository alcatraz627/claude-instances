<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude transcript</title>
<!--
  Live transcript viewer (data-first rewrite of the claude-instances detail page).

  This page holds NO transcript content of its own. On load it fetches /data —
  the normalized model emitted by transcript.py — and renders it client-side.
  That separation is what lets it show a full multi-day transcript that the old
  bake-everything-to-HTML page had to truncate:

    - the full model lives in memory; the list is PAGINATED so only one page of
      blocks is in the DOM at a time (snappy, no virtualization quirks);
    - the activity ribbon up top maps the whole conversation (one dot per block,
      coloured by who spoke) — click a dot to jump to its page;
    - search runs over the whole in-memory model, not the rendered page, so it
      finds matches on pages that were never opened, then jumps to them;
    - live updates fetch /data?since=<lastSeq> and append, instead of
      re-shipping the entire transcript every tick.
-->
<style>
:root {
    /* Soft blue-slate (GitHub-darkness, not near-black) — calmer than #0d1117.
       Color discipline: --accent = You, --accent2 = Claude (a coordinated pair);
       green/red (--add/--del/--err) are reserved strictly for diffs + errors. */
    --bg: #13151c; --surface: #1b1e27; --surface2: #252935;
    --text: #e9ecf4; --dim: #9499ab; --faint: #646a7e; --accent: #6f86f0;
    --accent2: #4fb6a6; --warn: #dcb05f; --err: #e07f72;
    --add: #6fc090; --del: #e07f72; --accent-soft: rgba(111,134,240,.18);
    --border: rgba(180,190,225,.13); --user-bg: rgba(111,134,240,.09); --asst-bg: transparent;
    --mark: #dcb05f; --mark-cur: #e07f72; --sel: #4fb6a6; --sel-soft: rgba(79,182,166,0.16);
}
:root.light {
    --bg: #f4f6f9; --surface: #fff; --surface2: #e8ebf0;
    --text: #1b1d23; --dim: #686c75; --faint: #8a8e98; --accent: #4a57c8;
    --accent2: #2f8e80; --warn: #9c7320; --err: #bb5346;
    --add: #3f8a59; --del: #bb5346; --accent-soft: rgba(74,87,200,.13);
    --border: rgba(20,24,40,.13); --user-bg: rgba(74,87,200,.08); --asst-bg: #fff;
    --mark: #ffd33d; --mark-cur: #ff8c42; --sel: #2f8e80; --sel-soft: rgba(47,142,128,0.14);
}
* { box-sizing: border-box; }
body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
}
code, pre, .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }

/* ── Feel layer: the premium-vs-utilitarian difference is feedback + motion ── */
button, .chip, summary, a, [role="button"], .copybtn, .dot, .subcard .sc-head,
.tl-row, .grouphead .ts { cursor: pointer; }
button, .chip, .pageinput, select, .copybtn, .tl-row {
    transition: background .15s ease, border-color .15s ease, color .15s ease,
                transform .12s ease, box-shadow .15s ease, opacity .15s ease;
}
button:active:not(:disabled), .chip:active, .copybtn:active, .tl-row:active { transform: scale(0.97); }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 7px; }
:focus:not(:focus-visible) { outline: none; }
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.05ms !important; scroll-behavior: auto !important; }
    button:active, .chip:active, .copybtn:active, .tl-row:active { transform: none; }
}

/* Header + controls — shared tokens: 28px control height, 7px radius */
.topbar {
    position: sticky; top: 0; z-index: 30; background: var(--surface);
    border-bottom: 1px solid var(--border); padding: 9px 14px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.title { font-weight: 700; font-size: 15px; display: inline-flex; align-items: baseline; gap: 7px; }
.backbtn { flex: none; display: inline-flex; align-items: center; height: 28px; padding: 0 10px;
    border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--dim); text-decoration: none;
    background: var(--surface2); border: 1px solid transparent; white-space: nowrap; }
.backbtn:hover { color: var(--accent); background: var(--surface); border-color: var(--border); }
.title .sid { color: var(--dim); font-weight: 400; font-size: 12px; font-family: ui-monospace, Menlo, monospace; }
.spacer { flex: 1; }
.pill {
    height: 28px; display: inline-flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 0 10px; font-size: 12px; color: var(--dim);
}
.pill b { color: var(--text); font-weight: 600; }
button {
    height: 30px; display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    background: var(--surface2); border: 1px solid transparent;
    color: var(--text); border-radius: 8px; padding: 0 11px;
    font-size: 12px; font-weight: 500;
}
button:hover:not(:disabled) { background: var(--surface); border-color: var(--border); }
button:disabled { opacity: 0.35; cursor: default; }
select {
    height: 30px; background: var(--surface2); border: 1px solid transparent;
    color: var(--text); border-radius: 8px; padding: 0 6px; font-size: 12px; cursor: pointer;
}
select:hover { border-color: var(--border); }
.searchwrap { display: inline-flex; align-items: center; gap: 6px; flex: 1 1 240px; max-width: 470px; position: relative; }
/* Search jump-palette: a results dropdown — tap a block to jump there. Empty
   query lists every block, so search doubles as a jump menu. */
.sresults { position: absolute; top: calc(100% + 5px); left: 0; right: 0; z-index: 60;
    background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
    box-shadow: 0 10px 30px -8px rgba(0,0,0,.5); max-height: 62vh; overflow-y: auto; padding: 5px; }
.sresults[hidden] { display: none; }
.sr-item { display: flex; align-items: baseline; gap: 9px; width: 100%; text-align: left;
    background: transparent; border: none; border-radius: 8px; padding: 7px 10px; }
.sr-item:hover { background: var(--surface2); }
.sr-role { flex: none; font-size: 10px; font-weight: 700; width: 42px; text-transform: uppercase;
    letter-spacing: .03em; color: var(--dim); }
.sr-role.role-user { color: var(--accent); } .sr-role.role-assistant { color: var(--accent2); }
.sr-snip { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 12.5px; color: var(--text); }
.sr-ts { flex: none; font-size: 10px; color: var(--faint, var(--dim)); font-variant-numeric: tabular-nums; }
.sr-empty, .sr-more { padding: 9px 10px; color: var(--dim); font-size: 12px; text-align: center; }
.searchbox { position: relative; flex: 1; display: flex; }
.searchbox::before {
    content: '⌕'; position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--dim); font-size: 17px; line-height: 1; pointer-events: none;
}
#q {
    width: 100%; height: 32px; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 9px; padding: 0 12px 0 31px; font-size: 13.5px;
}
#q::placeholder { color: var(--dim); }
#q:focus { outline: none; border-color: var(--accent); background: var(--bg);
    box-shadow: 0 0 0 3px var(--sel-soft); }
.matchnav { font-size: 12px; color: var(--dim); min-width: 64px; text-align: center; }
/* role filter chips — segmented, each carrying its ribbon colour swatch */
.chips { display: inline-flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
.chip {
    height: 28px; display: inline-flex; align-items: center; gap: 6px;
    border: none; border-left: 1px solid var(--border); border-radius: 0;
    background: var(--surface2); padding: 0 11px; color: var(--text);
}
.chip:first-child { border-left: none; }
.chip::before { content: ''; width: 8px; height: 8px; border-radius: 2px; background: var(--chip-c, var(--dim)); }
.chip[data-role="user"]      { --chip-c: var(--accent); }
.chip[data-role="assistant"] { --chip-c: var(--accent2); }
.chip[data-role="tools"]     { --chip-c: var(--warn); }
.chip[data-role="event"]     { --chip-c: var(--dim); }
.chip[aria-pressed="false"] { color: var(--dim); opacity: 0.5; }
.chip[aria-pressed="false"]::before { filter: grayscale(1); }

/* Activity ribbon (restored): one dot per block, click to jump. */
.section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--dim); margin-bottom: 6px;
}
.timeline { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
.timeline > summary {
    font-family: ui-monospace, Menlo, monospace; color: var(--dim);
    font-size: 12px; cursor: pointer; margin-bottom: 6px; list-style: none;
}
.timeline > summary::-webkit-details-marker { display: none; }
.timeline .dots {
    display: grid; grid-template-columns: repeat(20, 1fr); gap: 4px; padding: 4px 2px;
    max-height: 260px; overflow-y: auto;
}
button.dot {
    width: 100%; height: 16px; border-radius: 3px; border: 1px solid transparent;
    padding: 0; margin: 0; cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
}
button.dot:hover {
    transform: scale(1.18); filter: brightness(1.2);
    box-shadow: 0 0 0 2px var(--surface), 0 0 0 3px currentColor; z-index: 5;
}
/* current page = a teal highlight that PRESERVES each dot's role colour: the
   role colour stays the fill; teal rings the dots so the run reads as a band. */
button.dot.onpage { box-shadow: 0 0 0 4px var(--sel); border-radius: 2px; z-index: 1; }
button.dot.match  { outline: 2px solid var(--mark); outline-offset: 1px; }
.dot { display: inline-block; vertical-align: middle; }
.legend .dot { width: 10px; height: 10px; border-radius: 2px; flex: none; }
.dot-u { background: var(--accent);  color: var(--accent); }
.dot-a { background: var(--accent2); color: var(--accent2); }
.dot-t { background: var(--warn);    color: var(--warn); }
.dot-h { background: #a78bfa;        color: #a78bfa; }
.dot-m { background: var(--err);     color: var(--err); }
.dot-e { background: var(--dim);     color: var(--dim); }
.legend { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; font-size: 11px; color: var(--dim); font-family: ui-monospace, monospace; }
.legend span { display: inline-flex; align-items: center; gap: 6px; }

/* Pagination bar */
#pagerTop { display: none; }   /* one pager, pinned at the bottom */
.pager {
    display: flex; gap: 8px; align-items: center; justify-content: center;
    padding: 9px 16px; font-size: 12px; color: var(--dim); flex-wrap: nowrap;
}
/* per-page select sits inline with the pager pill, same floating-pill look */
.pager .sizeSel { height: 32px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface); box-shadow: 0 4px 16px -6px rgba(0,0,0,0.45); flex: none; padding: 0 8px; }
.pager.bottom {
    position: sticky; bottom: 0; z-index: 25;
    background: linear-gradient(to top, var(--bg) 55%, transparent);
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
}
.pgroup { display: inline-flex; align-items: stretch; border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; background: var(--surface);
    box-shadow: 0 4px 16px -6px rgba(0,0,0,0.45); }
.pgroup button {
    height: 30px; border: none; border-left: 1px solid var(--border); border-radius: 0;
    background: transparent; padding: 0 12px; font-size: 13px; color: var(--text);
}
.pgroup button:first-child { border-left: none; }
.pgroup button:hover:not(:disabled) { background: var(--surface); color: var(--accent); }
.pgroup .range {
    display: inline-flex; align-items: center; padding: 0 14px; color: var(--text);
    font-weight: 600; white-space: nowrap; border-left: 1px solid var(--border);
}
.psize { display: inline-flex; align-items: center; gap: 6px; color: var(--dim); }
.pageinput {
    width: 38px; height: 22px; text-align: center; font-size: 12px; font-weight: 600;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; margin: 0 2px; -moz-appearance: textfield;
}
.pageinput:focus { outline: none; border-color: var(--accent); }

/* Message list — capped reading measure, document-like turns (not boxed cards) */
#list { padding: 6px 16px 42vh; max-width: 720px; margin: 0 auto; }
.msg {
    border: none; border-radius: 12px; margin: 2px 0;
    padding: 12px 14px; background: transparent;
}
.msg.user { background: var(--user-bg); margin: 12px 0; }
.msg.assistant { background: transparent; }
.msg.tools { background: transparent; padding: 2px 14px; }
.msg.event { background: transparent; border: none; border-left: 2px solid var(--border);
    border-radius: 0; padding: 5px 12px; color: var(--dim); font-size: 12.5px; }
.msg.event.event-err { border-left-color: var(--err); color: var(--err); }
.msg.sidechain { border-left: 2px solid var(--accent); }

/* Day / idle-gap divider — chunks a long session into readable scenes */
.daydiv { display: flex; align-items: center; justify-content: center; margin: 20px 0 12px; }
.daydiv span { font-size: 11px; font-weight: 600; letter-spacing: 0.02em; color: var(--dim);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 12px; }

/* Loading skeleton — mirrors the real layout, shimmer left-to-right */
.skel { max-width: 720px; margin: 0 auto; padding: 18px 16px; }
.skel-row { height: 13px; border-radius: 6px; margin: 9px 0;
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 37%, var(--surface) 63%);
    background-size: 400% 100%; animation: shimmer 1.4s ease infinite; }
.skel-row.short { width: 35%; } .skel-row.med { width: 70%; } .skel-row.gap { height: 22px; background: none; animation: none; }
@keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }
@media (prefers-reduced-motion: reduce) { .skel-row { animation: none; } }
.msg.flash { animation: flash 1.2s ease; }
@keyframes flash { 0%,100% { box-shadow: none; } 30% { box-shadow: 0 0 0 3px var(--accent); } }
.row-head { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; font-size: 12px; color: var(--dim); }
.role-name { font-weight: 600; color: var(--text); font-size: 12.5px; }
.role-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; background: var(--dim); }
.role-dot.role-user { background: var(--accent); }
.role-dot.role-assistant { background: var(--accent2); }
.hgap { flex: 1; }
.row-head .ts { color: var(--dim); opacity: 0.6; font-variant-numeric: tabular-nums; font-size: 11.5px; }
.badge { font-size: 10.5px; font-weight: 600; padding: 1.5px 7px; border-radius: 6px;
    border: none; background: var(--surface2); color: var(--dim); letter-spacing: 0.01em; }
.badge.sub { color: var(--accent); background: color-mix(in srgb, var(--accent) 15%, transparent); }
.badge.tok { color: var(--accent2); background: color-mix(in srgb, var(--accent2) 15%, transparent); }
.copybtn { height: 22px; width: 24px; padding: 0; border: none; background: transparent;
    color: var(--dim); border-radius: 5px; font-size: 13px; }
.copybtn:hover { color: var(--accent); background: var(--surface2); }
@media (hover: hover) { .copybtn { opacity: 0; } .msg:hover .copybtn, .msg:focus-within .copybtn { opacity: 1; } }
.content { overflow-wrap: anywhere; line-height: 1.6; font-size: 14.5px; }
.content p { margin: 0.5em 0; }
.content p:first-child { margin-top: 0; }
.content p:last-child { margin-bottom: 0; }
.content pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; overflow-x: auto; font-size: 12.5px; }
.content :not(pre) > code { background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-size: 12.5px; }
mark { background: var(--mark); color: #000; border-radius: 2px; }
mark.cur { background: var(--mark-cur); outline: 2px solid var(--mark-cur); }

/* Sub-agent dispatch card */
.subcard { border: 1px solid var(--accent); border-radius: 8px; margin: 8px 0; background: var(--surface); }
.subcard .sc-head { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; }
.subcard .sc-type { color: var(--accent); font-weight: 600; }
.subcard .sc-desc { color: var(--text); }
.subcard .sc-panel { border-top: 1px solid var(--border); padding: 8px 12px; display: none; }
.subcard.open .sc-panel { display: block; }
.subcard .sc-panel .msg { margin-left: 12px; }

/* Tool list */
.tool-list { list-style: none; margin: 0; padding: 0; }
.tool-item { padding: 1px 0; }
.tool-name { color: var(--accent); font-weight: 600; font-family: ui-monospace, monospace; font-size: 12.5px; }
.tool-prev { color: var(--dim); font-size: 12px; }
details.tool-json summary, details.sysrem summary { cursor: pointer; color: var(--dim); font-size: 12px; }

/* Tool call: collapsed one-line summary row (icon · name · preview), tap to expand */
.tl-row { display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
    background: transparent; border: none; border-radius: 8px; padding: 6px 8px; height: auto; }
.tl-row:hover { background: var(--surface2); }
.tl-ico { width: 22px; height: 22px; flex: none; display: inline-flex; align-items: center;
    justify-content: center; border-radius: 6px; font-size: 12px; background: var(--surface2); color: var(--dim); }
/* Color by kind: edits=accent (a write action), reads=dim (passive),
   shell=warn, agents/MCP=accent2 (Claude's secondary). */
.tl-ico.tl-edit { color: var(--accent); } .tl-ico.tl-bash { color: var(--warn); }
.tl-ico.tl-read { color: var(--dim); } .tl-ico.tl-other { color: var(--accent2); }
.tl-row .tool-prev { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tl-caret { flex: none; color: var(--dim); font-size: 11px; transition: transform .15s ease; }
.tl-row[aria-expanded="true"] .tl-caret { transform: rotate(90deg); }
.tl-body { padding: 2px 6px 8px 39px; }
.tl-body[hidden] { display: none; }
/* Work meter above a tool run — quantifies the weight of work in one Claude turn */
.tl-meter { display: flex; align-items: center; gap: 8px; margin: 1px 0 7px;
    font-size: 11px; color: var(--dim); font-variant-numeric: tabular-nums; }
.tl-meter .tl-worked { font-size: 9.5px; font-weight: 700; letter-spacing: .09em;
    text-transform: uppercase; color: var(--faint, var(--dim)); flex: none; }
.tl-meter .tl-sep { flex: 1; height: 1px; background: var(--border); }

/* Rich tool bodies: Edit/Write → colored diff; Bash → highlighted command */
.tool-body { margin-top: 5px; }
.diff { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin: 2px 0; }
.diff .file { padding: 4px 8px; background: var(--surface2); color: var(--dim); font: 11.5px ui-monospace, Menlo, monospace; border-bottom: 1px solid var(--border); overflow-wrap: anywhere; }
.diff .lines { padding: 5px 0; overflow-x: auto; font: 12px/1.5 ui-monospace, Menlo, monospace; max-height: 360px; overflow-y: auto; }
.diff .del, .diff .add { display: block; white-space: pre; padding: 0 8px; }
.diff .del { background: color-mix(in srgb, var(--del) 14%, transparent); color: var(--del); }
.diff .add { background: color-mix(in srgb, var(--add) 14%, transparent); color: var(--add); }
.diff .del::before { content: '−\00a0'; opacity: 0.55; }
.diff .add::before { content: '+\00a0'; opacity: 0.55; }
.diff .more { padding: 3px 8px; color: var(--dim); font-style: italic; }
.bash-desc { color: var(--dim); font-size: 12px; margin: 2px 0 4px; }
.bash-cmd { background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--warn);
    border-radius: 6px; padding: 7px 9px; font: 12.5px ui-monospace, Menlo, monospace;
    overflow-x: auto; white-space: pre-wrap; overflow-wrap: anywhere; }
/* TodoWrite → checkbox list */
.todo-list { list-style: none; display: flex; flex-direction: column; gap: 3px; margin: 2px 0; }
.todo-item { display: flex; gap: 8px; align-items: baseline; font-size: 13px; color: var(--text); }
.todo-item .box { flex: none; width: 13px; text-align: center; font-size: 11px; color: var(--dim); }
.todo-item.done { color: var(--dim); } .todo-item.done .txt { text-decoration: line-through; }
.todo-item.done .box { color: var(--add); }
.todo-item.active { font-weight: 600; } .todo-item.active .box { color: var(--accent); }
/* Read / Grep / MCP → file paths + capped pretty JSON */
.json-paths { margin-bottom: 5px; }
.json-paths .path { color: var(--accent2); font: 12px ui-monospace, Menlo, monospace; margin-right: 8px; overflow-wrap: anywhere; }
.json-body { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 9px; font: 12px/1.5 ui-monospace, Menlo, monospace; color: var(--dim);
    overflow-x: auto; max-height: 320px; overflow-y: auto; white-space: pre; margin: 2px 0; }
.copybtn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 13px;
    height: 22px; width: 24px; padding: 0; border-radius: 5px; line-height: 1; }
.copybtn:hover { color: var(--accent); background: var(--surface2); }
.jumplatest { position: fixed; right: 16px; bottom: calc(78px + env(safe-area-inset-bottom)); z-index: 40;
    display: none; align-items: center; gap: 6px; height: 40px; padding: 0 17px; border-radius: 22px;
    background: var(--accent); color: #fff; border: none; font-size: 13px; font-weight: 600; cursor: pointer;
    box-shadow: 0 4px 16px -4px rgba(0,0,0,0.5); }
.jumplatest.show { display: inline-flex; }
.sysrem { margin-top: 6px; }
.loading, .empty { color: var(--dim); text-align: center; padding: 40px; }
/* Calm session/state messages + an explicit end-of-list terminus */
.state-msg { text-align: center; padding: 64px 24px; color: var(--dim); }
.state-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.state-sub { font-size: 13px; }
.list-end { text-align: center; color: var(--faint, var(--dim)); font-size: 11px;
    letter-spacing: .04em; padding: 18px 0 8px; }
/* Scroll-away masthead — identity, token split-bar, stat tiles */
.masthead { max-width: 720px; margin: 0 auto; padding: 16px 16px 10px; }
.mh-id { font-size: 12px; color: var(--dim); margin-bottom: 11px; overflow-wrap: anywhere; }
.mh-bar { display: flex; height: 8px; border-radius: 5px; overflow: hidden; background: var(--surface2); }
.mh-seg.in { background: var(--accent); } .mh-seg.out { background: var(--accent2); }
.mh-seg.cache { background: var(--accent2); opacity: .3; }
.mh-legend { display: flex; gap: 15px; margin: 8px 0 13px; font-size: 11px; color: var(--dim); font-variant-numeric: tabular-nums; }
.mh-legend .in { color: var(--accent); } .mh-legend .out { color: var(--accent2); }
.mh-stats { display: flex; gap: 22px; flex-wrap: wrap; }
.mh-tile { font-size: 12px; color: var(--dim); }
.mh-tile b { color: var(--text); font-size: 15px; font-weight: 700; margin-right: 4px; font-variant-numeric: tabular-nums; }
/* Compact density — tightens the whole reading column */
.compact .content { font-size: 13px; line-height: 1.48; }
.compact .msg { margin-bottom: 9px; }
.compact .row-head { margin-bottom: 3px; }
.compact .tl-row { padding: 4px 8px; }
.compact .daydiv { margin: 12px 0 8px; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); display: inline-block; }
.live-dot.stale { background: var(--dim); }

/* Narrow screens (phone) — the page's primary mobile target. The activity
   ribbon is collapsed by default here (see JS) so the conversation, not a wall
   of dots, is what greets you; the topbar packs tight and search gets its own
   full-width row; the pager stops floating and grows to finger-sized hits. */
@media (max-width: 760px) {
    .topbar { padding: 8px 10px; gap: 6px; }
    .title { font-size: 14px; }
    .pill { height: 26px; font-size: 11px; padding: 0 8px; }
    .spacer { display: none; }
    .searchwrap { flex-basis: 100%; max-width: none; order: 2; }
    #themeToggle { margin-left: auto; }
    .timeline { padding: 8px 12px; }
    .timeline .dots { grid-template-columns: repeat(12, 1fr); max-height: 144px; gap: 3px; }
    button.dot { height: 14px; }
    .pager { position: static; top: auto; padding: 8px 10px; }
    .pgroup button { height: 38px; padding: 0 13px; }
    .pageinput { height: 26px; width: 42px; }
    #list { padding: 10px 12px 38vh; }
    .msg { padding: 11px 12px; }
    .subcard .sc-panel .msg { margin-left: 6px; }
    /* Code wraps on a phone so scrolling stays one-axis (no sideways drag). */
    .content pre { white-space: pre-wrap; overflow-wrap: anywhere; }
    .pill { height: 24px; }
}

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script>
"use strict";

// API base + per-session storage key work in two deployments:
//   hub:    page served at /s/<id>/  → data at /s/<id>/data
//   legacy: page served at /claude-widget-<pid>.html → data at /data
const HUB = location.pathname.match(/\/s\/([\w-]+)\/?$/);
const SESSION_KEY = HUB ? HUB[1] : (location.pathname.match(/claude-widget-(\w+)/) || [, 'x'])[1];
const API = HUB ? `/s/${HUB[1]}/` : '/';
const SS = {
    theme: 'ct-theme', q: 'ct-q-' + SESSION_KEY, roles: 'ct-roles-' + SESSION_KEY,
    page: 'ct-page-' + SESSION_KEY, size: 'ct-size-' + SESSION_KEY,
};

// ── Theme (dark default, persisted) ─────────────────────────────────────────
function applyTheme(t) {
    document.documentElement.classList.toggle('light', t === 'light');
    const link = document.getElementById('hljs-theme');
    link.href = t === 'light'
        ? 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css'
        : 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css';
}
(function () {
    const link = document.createElement('link');
    link.id = 'hljs-theme'; link.rel = 'stylesheet'; document.head.appendChild(link);
    applyTheme(localStorage.getItem(SS.theme) || 'dark');
})();
document.getElementById('themeToggle').addEventListener('click', () => {
    const next = document.documentElement.classList.contains('light') ? 'dark' : 'light';
    localStorage.setItem(SS.theme, next); applyTheme(next);
});
// ── Density (default | compact) — the useful axis of the handoff's "directions" ─
const DENS_KEY = 'ct-density';
function applyDensity(d) { document.documentElement.classList.toggle('compact', d === 'compact'); }
applyDensity(localStorage.getItem(DENS_KEY) || 'default');
document.getElementById('densityBtn').addEventListener('click', () => {
    const d = document.documentElement.classList.contains('compact') ? 'default' : 'compact';
    localStorage.setItem(DENS_KEY, d); applyDensity(d);
});
// ── Text size: zoom the reading surface; the chrome (topbar/pager) stays fixed ─
const ZOOMS = [0.92, 1, 1.12, 1.28], ZKEY = 'ct-zoom';
let zoomIdx = Math.min(ZOOMS.length - 1, Math.max(0, parseInt(localStorage.getItem(ZKEY) || '1', 10)));
function applyZoom() {
    document.getElementById('list').style.zoom = ZOOMS[zoomIdx];
    document.getElementById('masthead').style.zoom = ZOOMS[zoomIdx];
}
applyZoom();
document.getElementById('sizeBtn').addEventListener('click', () => {
    zoomIdx = (zoomIdx + 1) % ZOOMS.length;
    localStorage.setItem(ZKEY, String(zoomIdx)); applyZoom();
});

// ── Model + view state ──────────────────────────────────────────────────────
const state = {
    meta: {}, records: [], bySeq: new Map(),
    enabledRoles: new Set(JSON.parse(localStorage.getItem(SS.roles) || '["user","assistant","tools","event"]')),
    page: 0,
    pageSize: parseInt(localStorage.getItem(SS.size) || '200', 10),
    pageWasLast: true,            // stick to the newest page as live data arrives
    term: '',
    matches: [],                  // [{seq, count}]
    occurrences: [],              // [{seq, n}] flattened, in document order
    matchCursor: -1,
    lastSeq: 0,
    newCount: 0,                  // blocks arrived while scrolled away → "N new ↓"
};

const ROLE_KIND = { user: 'u', assistant: 'a', tools: 't', event: 'e' };

function fmtTokens(n) {
    if (n == null) return '';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(n);
}
function esc(s) { return (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

function searchText(r) {
    if (r._search != null) return r._search;
    let t = '';
    if (r.role === 'user' || r.role === 'assistant' || r.role === 'event') t = r.text || '';
    else if (r.role === 'tools') t = (r.tools || []).map(x => {
        const sub = x.subagent ? (x.subagent.agentType + ' ' + (x.subagent.description || '')) : '';
        return x.name + ' ' + (x.preview || '') + ' ' + sub;

    return r._search;
}
function visibleRecords() { return state.records.filter(r => state.enabledRoles.has(r.role)); }
function pageCount() { return Math.max(1, Math.ceil(visibleRecords().length / state.pageSize)); }
function dotKind(r) {
    if (r.role === 'event') return r.event_type === 'mode-change' ? 'm' : (r.event_type === 'hook-summary' ? 'h' : 'e');
    return ROLE_KIND[r.role] || 'e';
}
function snippet(s) { s = (s || '').replace(/\s+/g, ' ').trim(); return s.length > 72 ? s.slice(0, 71) + '…' : s; }
function dotTitle(r) {
    // Hover info for a ribbon dot: who/what the target block is, plus its time.
    let label;
    if (r.role === 'user') label = 'You — ' + snippet(r.text);
    else if (r.role === 'assistant') label = 'Claude — ' + snippet(r.text);
    else if (r.role === 'tools') {
        const sub = r.tools.find(t => t.subagent);
        label = sub
            ? '↳ ' + (sub.subagent.agentType || 'sub-agent') + ': ' + snippet(sub.subagent.description)
            : 'tools — ' + r.tools.map(t => t.name).slice(0, 5).join(', ');
    } else label = snippet(r.text) || 'event';
    return `#${r.seq}  ·  ${label}` + (r.ts ? `\n${r.ts_full || r.ts}` : '');
}

// ── Render one record to a row element ──────────────────────────────────────
function renderRow(r) {
    const el = document.createElement('div');
    el.id = 'seq-' + r.seq; el.dataset.seq = r.seq; el.dataset.role = r.role;
    if (r.role === 'tools' && r.tools.some(t => t.subagent)) {

        // group still need their <ul> wrapper (don't emit bare <li>s).
        el.className = 'subcard-wrap';
        const subs = r.tools.filter(t => t.subagent).map(renderTool).join('');
        const normals = r.tools.filter(t => !t.subagent);
        const normalHtml = normals.length ? `<ul class="tool-list">${normals.map(renderTool).join('')}</ul>` : '';
        el.innerHTML = toolMeter(r) + subs + normalHtml;
    } else {
        el.className = 'msg ' + r.role + (r.sidechain ? ' sidechain' : '');
        el.innerHTML = rowHead(r) + rowBody(r);
        const md = el.querySelector('.content[data-md]');
        if (md && window.marked) {
            md.innerHTML = marked.parse(md.getAttribute('data-raw') || '');
            md.querySelectorAll('pre code').forEach(b => { try { hljs.highlightElement(b); } catch (e) {} });
        }
    }
    if (state.term) highlightEl(el, state.term);
    wireCard(el);
    return el;
}
function rowHead(r) {
    // Clean sender line: a small role dot + name, badges, then a receding
    // timestamp and a hover-revealed copy. No #seq dev-artifact, no emoji avatar.
    const name = { user: 'You', assistant: 'Claude' + (r.model ? ' · ' + shortModel(r.model) : '') }[r.role] || '';
    if (!name) return '';  // tools + events carry their own row treatment, no header
    let badges = '';
    if (r.sidechain) badges += '<span class="badge sub">↳ subagent</span>';
    if (r.role === 'assistant' && r.tokens && r.tokens.out) badges += `<span class="badge tok">↑${fmtTokens(r.tokens.out)}</span>`;
    const ts = r.ts ? `<span class="ts" title="${esc(r.ts_full || '')}">${esc(r.ts)}</span>` : '';
    const copy = `<button class="copybtn" title="Copy as markdown" aria-label="Copy as markdown">⧉</button>`;
    return `<div class="row-head"><span class="role-dot role-${r.role}"></span><span class="role-name">${esc(name)}</span>${badges}<span class="hgap"></span>${ts}${copy}</div>`;
}
function rowBody(r) {
    if (r.role === 'user' || r.role === 'assistant') {
        let text = r.text || '', sysrem = '';
        if (r.system_reminders > 0) {
            const stripped = text.split(/<system-reminder>[\s\S]*?<\/system-reminder>/).join('').trim();
            sysrem = `<details class="sysrem"><summary>ⓘ ${r.system_reminders} system-reminder block(s)</summary><pre>${esc(text)}</pre></details>`;
            text = stripped || '_(only system-reminder content)_';
        }
        return `<div class="content" data-md data-raw="${esc(text)}"></div>${sysrem}`;
    }
    if (r.role === 'event') {
        let html = esc(r.text || '');
        if (r.errors && r.errors.length)
            html += `<details class="tool-json"><summary>view ${r.errors.length} error(s)</summary><pre>${esc(r.errors.map(e => typeof e === 'string' ? e : JSON.stringify(e)).join('\n'))}</pre></details>`;
        return `<div class="content">${html}</div>`;
    }
    if (r.role === 'tools') return `<div class="content">${toolMeter(r)}<ul class="tool-list">${r.tools.map(renderTool).join('')}</ul></div>`;
    return '';
}
// The weight of one Claude turn's work: elapsed (only when the run genuinely
// spans time, so an idle user gap never inflates it) · tool count · output tokens.
function fmtDur(ms) {
    const s = Math.round(ms / 1000);
    if (s < 60) return s + 's';
    const m = Math.round(s / 60);
    if (m < 60) return m + 'm';
    const h = Math.floor(m / 60); return h + 'h ' + (m % 60) + 'm';
}
function toolMeter(r) {
    const tools = r.tools || [], n = tools.length;
    const tok = (r.tokens && r.tokens.out) || 0;
    let span = '';
    const t0 = tools[0] && tools[0].ts_iso, t1 = tools[n - 1] && tools[n - 1].ts_iso;
    if (t0 && t1) { const ms = new Date(t1) - new Date(t0); if (ms >= 30000) span = fmtDur(ms) + ' · '; }
    const stats = `${span}${n} tool${n !== 1 ? 's' : ''}${tok ? ' · ↑' + fmtTokens(tok) : ''}`;
    return `<div class="tl-meter"><span class="tl-worked">worked</span><span>${stats}</span><span class="tl-sep"></span></div>`;
}
function renderTool(t) {
    if (t.subagent) {
        const sa = t.subagent, can = sa.exists && sa.agentId;
        return `<div class="subcard" data-agent="${esc(sa.agentId || '')}" data-can="${can ? '1' : '0'}">
            <div class="sc-head"><span>↳</span><span class="sc-type">${esc(sa.agentType || 'sub-agent')}</span>
            <span class="sc-desc">${esc(sa.description || t.preview || '')}</span>
            ${can ? '<span class="badge sub" style="margin-left:auto">open transcript ▾</span>' : '<span class="seq">(no transcript)</span>'}</div>
            <div class="sc-panel"></div></div>`;
    }
    // Collapsed by default: a dense one-line row (icon · name · preview). The
    // body (diff / command / output) reveals on tap — so a tool-heavy transcript
    // reads as a scannable list, not a wall of dumps.
    const summary = `<button class="tl-row" aria-expanded="false">
        <span class="tl-ico tl-${kindClass(t.name)}">${toolIcon(t.name)}</span>
        <span class="tool-name">${esc(t.name)}</span>
        <span class="tool-prev">${esc(t.preview || '')}</span>
        <span class="tl-caret">▸</span></button>`;
    return `<li class="tool-item">${summary}<div class="tl-body" hidden>${toolBody(t)}</div></li>`;
}
function toolIcon(name) {
    return ({ Edit: '✎', MultiEdit: '✎', Write: '＋', Bash: '❯', Read: '◇', Grep: '⌕',
        Glob: '⌖', WebFetch: '⊕', TodoWrite: '☑', Task: '↳' })[name] || '·';
}
function kindClass(name) {
    if (name === 'Edit' || name === 'MultiEdit' || name === 'Write') return 'edit';
    if (name === 'Bash') return 'bash';
    if (name === 'Read' || name === 'Grep' || name === 'Glob') return 'read';
    return 'other';
}
// A diff-style block: removed lines then added lines, each capped so a huge
// Write/Edit can't blow up the DOM.
function diffLines(str, cls, cap) {
    const lines = (str == null ? '' : String(str)).split('\n');
    const shown = lines.slice(0, cap).map(l => `<span class="${cls}">${esc(l) || ' '}</span>`).join('');
    const more = lines.length > cap ? `<div class="more">… ${lines.length - cap} more line(s)</div>` : '';
    return shown + more;
}
function diffBlock(file, oldStr, newStr) {
    return `<div class="diff"><div class="file">${esc(file || '')}</div><div class="lines">${diffLines(oldStr, 'del', 200)}${diffLines(newStr, 'add', 200)}</div></div>`;
}
// Reads / Greps / MCP calls etc.: surface any file paths, then the input as a
// capped pretty-printed JSON block (open, not hidden — you tapped to see it).
function jsonBody(t) {
    const paths = (t.paths || []).map(p => `<span class="path">${esc(p)}</span>`).join(' ');
    const raw = JSON.stringify(t.input || {}, null, 2);
    const lines = raw.split('\n'), cap = 40;
    const shown = esc(lines.slice(0, cap).join('\n'));
    const more = lines.length > cap ? `\n… ${lines.length - cap} more line(s)` : '';
    return `${paths ? `<div class="json-paths">${paths}</div>` : ''}<pre class="json-body">${shown}${esc(more)}</pre>`;
}
// TodoWrite: a real checkbox list — done is struck + green tick, in-progress is
// an accent caret, so the plan's state reads at a glance.
function todoBody(inp) {
    const todos = inp.todos || [];
    if (!todos.length) return jsonBody({ input: inp, paths: [] });
    const rows = todos.map(td => {
        const st = td.status || 'pending';
        const box = st === 'completed' ? '✔' : st === 'in_progress' ? '▸' : '○';
        const cls = st === 'completed' ? 'done' : st === 'in_progress' ? 'active' : '';
        const txt = st === 'in_progress' && td.activeForm ? td.activeForm : (td.content || td.activeForm || '');
        return `<li class="todo-item ${cls}"><span class="box">${box}</span><span class="txt">${esc(txt)}</span></li>`;
    }).join('');

}
function toolBody(t) {
    const inp = t.input || {};
    if (t.name === 'Edit') return diffBlock(inp.file_path, inp.old_string, inp.new_string);
    if (t.name === 'MultiEdit') return (inp.edits || []).map(e => diffBlock(inp.file_path, e.old_string, e.new_string)).join('') || jsonBody(t);
    if (t.name === 'Write') return `<div class="diff"><div class="file">＋ ${esc(inp.file_path || '')}</div><div class="lines">${diffLines(inp.content, 'add', 80)}</div></div>`;
    if (t.name === 'Bash') return `${inp.description ? `<div class="bash-desc">${esc(inp.description)}</div>` : ''}<div class="bash-cmd">${esc(inp.command || '')}</div>`;
    if (t.name === 'TodoWrite') return todoBody(inp);
    return jsonBody(t);
}
function shortModel(m) {
    m = (m || '').toLowerCase();
    if (m.includes('opus')) return 'Opus'; if (m.includes('sonnet')) return 'Sonnet';
    if (m.includes('haiku')) return 'Haiku'; if (m.includes('fable')) return 'Fable';
    return m;
}
// Clipboard that works over plain http too (the phone hits the hub on an
// insecure origin, where navigator.clipboard is unavailable — fall back to the
// old hidden-textarea trick there).
function copyText(s) {
    if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(s);
    return new Promise(res => {
        const ta = document.createElement('textarea');
        ta.value = s; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand('copy'); } catch (e) {}

}
function wireCard(el) {
    el.querySelectorAll('.tl-row').forEach(rowEl => rowEl.addEventListener('click', () => {
        const body = rowEl.nextElementSibling;
        if (!body || !body.classList.contains('tl-body')) return;
        const hidden = body.hasAttribute('hidden');
        if (hidden) { body.removeAttribute('hidden'); rowEl.setAttribute('aria-expanded', 'true'); }
        else { body.setAttribute('hidden', ''); rowEl.setAttribute('aria-expanded', 'false'); }
    }));

        e.stopPropagation();
        const md = el.querySelector('.content[data-md]');
        const raw = md ? md.getAttribute('data-raw') : (el.innerText || '');
        copyText(raw).then(() => { btn.textContent = '✓'; setTimeout(() => { btn.textContent = '⧉'; }, 1000); });
    }));
    el.querySelectorAll('.subcard[data-can="1"]').forEach(card => {
        card.querySelector('.sc-head').addEventListener('click', async () => {
            card.classList.toggle('open');
            const panel = card.querySelector('.sc-panel');
            if (card.classList.contains('open') && !panel.dataset.loaded) {
                panel.dataset.loaded = '1';
                panel.innerHTML = '<div class="loading">Loading sub-agent…</div>';
                try {
                    const data = await (await fetch(API + 'data?agent=' + encodeURIComponent(card.dataset.agent))).json();
                    panel.innerHTML = '';
                    data.records.forEach(sr => { sr._search = null; panel.appendChild(renderRow(sr)); });
                } catch (e) { panel.innerHTML = '<div class="empty">Failed to load sub-agent transcript.</div>'; }
            }
        });
    });
}
function highlightEl(el, term) {
    const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, {
        acceptNode: n => n.parentElement.closest('script,style,mark') ? NodeFilter.FILTER_REJECT

    });

        const frag = document.createDocumentFragment(), text = node.nodeValue, low = text.toLowerCase();
        let i = 0, pos;
        while ((pos = low.indexOf(term, i)) !== -1) {
            if (pos > i) frag.appendChild(document.createTextNode(text.slice(i, pos)));
            const mk = document.createElement('mark'); mk.textContent = text.slice(pos, pos + term.length); frag.appendChild(mk);
            i = pos + term.length;
        }
        if (i < text.length) frag.appendChild(document.createTextNode(text.slice(i)));
        node.parentNode.replaceChild(frag, node);
    }
}

// ── Pagination ──────────────────────────────────────────────────────────────
const listEl = document.getElementById('list');
function clampPage() {
    const pc = pageCount();
    if (state.page >= pc) state.page = pc - 1;
    if (state.page < 0) state.page = 0;
}
function renderPage() {
    clampPage();
    const recs = visibleRecords();
    listEl.innerHTML = '';
    if (!recs.length) {
        listEl.innerHTML = state.records.length === 0
            ? '<div class="state-msg"><div class="state-title">Session is quiet</div><div class="state-sub">Blocks appear here as Claude works.</div></div>'
            : '<div class="empty">No blocks match the current filter.</div>';
        renderPager(); renderTimeline(); return;
    }
    const start = state.page * state.pageSize, end = Math.min(start + state.pageSize, recs.length);
    const frag = document.createDocumentFragment();
    let prev = start > 0 ? recs[start - 1] : null;
    for (let i = start; i < end; i++) {
        const div = dividerBetween(prev, recs[i]);
        if (div) frag.appendChild(div);
        frag.appendChild(renderRow(recs[i]));
        prev = recs[i];
    }
    listEl.appendChild(frag);
    if (state.page === pageCount() - 1) {                 // explicit terminus on the last page
        const term = document.createElement('div');
        term.className = 'list-end'; term.textContent = '— end of transcript —';
        listEl.appendChild(term);
    }
    localStorage.setItem(SS.page, String(state.page));
    renderPager(); renderTimeline(); updateJump();
}
// A date or idle-gap divider before a block — chunks a long session into scenes.
function fmtDay(d) { return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }); }
function dividerBetween(prev, cur) {
    if (!cur || !cur.ts_iso) return null;
    const cd = new Date(cur.ts_iso); if (isNaN(cd)) return null;
    let label = null;
    if (!prev || !prev.ts_iso) {
        label = fmtDay(cd);
    } else {
        const pd = new Date(prev.ts_iso);
        if (pd.toDateString() !== cd.toDateString()) label = fmtDay(cd);
        else {
            const gap = (cd - pd) / 1000;
            if (gap > 1800) {              // >30 min idle
                const h = Math.floor(gap / 3600), m = Math.round((gap % 3600) / 60);
                label = ((h ? h + 'h ' : '') + (m ? m + 'm ' : '')).trim() + ' later';
            }
        }
    }
    if (!label) return null;
    const el = document.createElement('div');
    el.className = 'daydiv';
    el.innerHTML = `<span>${esc(label)}</span>`;
    return el;
}
function gotoPage(p, scrollTop = true) {
    state.page = p; clampPage();
    state.pageWasLast = state.page === pageCount() - 1;
    renderPage();
    if (scrollTop) window.scrollTo(0, 0);
}
function renderPager() {
    const recs = visibleRecords(), pc = pageCount();
    // One page (the common case at 200/page) reads as one continuous scroll —
    // no pager chrome at all.
    if (pc <= 1) {
        document.getElementById('pagerTop').innerHTML = '';
        document.getElementById('pagerBottom').innerHTML = '';
        return;
    }
    const start = recs.length ? state.page * state.pageSize + 1 : 0;
    const end = Math.min((state.page + 1) * state.pageSize, recs.length);
    const html = `
        <div class="pgroup">
            <button data-pg="first" title="First page (Home)" ${state.page === 0 ? 'disabled' : ''}>⏮</button>
            <button data-pg="prev" title="Previous page (← or [)" ${state.page === 0 ? 'disabled' : ''}>◀</button>
            <span class="range" title="blocks ${start}–${end} of ${recs.length}">page <input class="pageinput" type="text" name="page" inputmode="numeric" value="${state.page + 1}" aria-label="Go to page"> / ${pc}</span>
            <button data-pg="next" title="Next page (→ or ])" ${state.page >= pc - 1 ? 'disabled' : ''}>▶</button>
            <button data-pg="last" title="Last page (End)" ${state.page >= pc - 1 ? 'disabled' : ''}>⏭</button>
        </div>
        <select class="sizeSel" name="pagesize" aria-label="Blocks per page" title="Blocks per page">${[100, 200, 500].map(s => `<option value="${s}" ${s === state.pageSize ? 'selected' : ''}>${s}/pg</option>`).join('')}</select>`;
    for (const id of ['pagerTop', 'pagerBottom']) document.getElementById(id).innerHTML = html;
    document.querySelectorAll('.pager [data-pg]').forEach(b => b.addEventListener('click', () => {
        const pc2 = pageCount();
        gotoPage({ first: 0, prev: state.page - 1, next: state.page + 1, last: pc2 - 1 }[b.dataset.pg]);
    }));
    document.querySelectorAll('.sizeSel').forEach(sel => sel.addEventListener('change', e => {
        state.pageSize = parseInt(e.target.value, 10);
        localStorage.setItem(SS.size, String(state.pageSize));
        gotoPage(state.page);
    }));
    document.querySelectorAll('.pageinput').forEach(inp => {
        const jump = () => {
            const n = parseInt(inp.value, 10);
            if (!isNaN(n)) gotoPage(Math.min(Math.max(n, 1), pageCount()) - 1);
            else inp.value = state.page + 1;
        };
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); jump(); inp.blur(); } });
        inp.addEventListener('blur', jump);
    });
}

// ── Activity ribbon ─────────────────────────────────────────────────────────
function renderTimeline() {
    const recs = visibleRecords();
    document.getElementById('timelineSummary').textContent = `━━ activity (${recs.length} blocks) — click a dot to jump ━━`;
    const matchSeqs = new Set(state.matches.map(m => m.seq));
    const start = state.page * state.pageSize, end = start + state.pageSize;
    const dots = document.getElementById('dots');
    dots.innerHTML = '';
    const frag = document.createDocumentFragment();
    recs.forEach((r, i) => {
        const b = document.createElement('button');
        const kind = dotKind(r);
        b.className = 'dot dot-' + kind + (i >= start && i < end ? ' onpage' : '') + (matchSeqs.has(r.seq) ? ' match' : '');
        b.title = dotTitle(r);
        b.addEventListener('click', () => goToSeq(r.seq));
        frag.appendChild(b);
    });
    dots.appendChild(frag);
    // Keep the current-page (teal) band in view as you page around.
    const firstOnPage = dots.querySelector('.dot.onpage');
    if (firstOnPage) dots.scrollTop = Math.max(0, firstOnPage.offsetTop - dots.clientHeight / 2);
}

// ── Jump to a specific block (flip to its page, scroll, flash) ───────────────
function goToSeq(seq, flash = true) {
    const recs = visibleRecords();
    const idx = recs.findIndex(r => r.seq === seq);
    if (idx < 0) return;
    const targetPage = Math.floor(idx / state.pageSize);
    if (targetPage !== state.page) gotoPage(targetPage, false);
    const row = document.getElementById('seq-' + seq);
    if (!row) return;
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    if (flash) { row.classList.remove('flash'); void row.offsetWidth; row.classList.add('flash'); setTimeout(() => row.classList.remove('flash'), 1200); }
    return row;
}

// ── Search across the whole model ───────────────────────────────────────────
function computeMatches(term) {
    const matches = [], occurrences = [];
    if (term) for (const r of visibleRecords()) {
        const txt = searchText(r); let c = 0, i = 0, pos;
        while ((pos = txt.indexOf(term, i)) !== -1) { c++; i = pos + term.length; }
        if (c > 0) { matches.push({ seq: r.seq, count: c }); for (let n = 0; n < c; n++) occurrences.push({ seq: r.seq, n }); }
    }
    return { matches, occurrences };
}
function runSearch(term) {
    state.term = term;
    ({ matches: state.matches, occurrences: state.occurrences } = computeMatches(term));
    state.matchCursor = state.occurrences.length ? 0 : -1;
    renderPage();
    updateMatchNav();
    const sp = document.getElementById('searchResults');
    if (sp && !sp.hidden) buildResults();                  // palette open → refresh the list, don't yank the view
    else if (state.matchCursor >= 0) gotoOccurrence(0);    // programmatic search → keep the jump-to-first behaviour
}
// Recompute the match set after live data arrives WITHOUT moving the user's
// view — keeps the "N / M" counter and ribbon marks honest mid-search.
function refreshMatches() {
    if (!state.term) return;
    ({ matches: state.matches, occurrences: state.occurrences } = computeMatches(state.term));
    if (state.matchCursor >= state.occurrences.length) state.matchCursor = state.occurrences.length - 1;
    updateMatchNav();
    renderTimeline();
}
function updateMatchNav() {
    const nav = document.getElementById('matchnav');
    nav.textContent = !state.term ? '' : (state.occurrences.length ? `${state.matchCursor + 1} / ${state.occurrences.length}` : 'no matches');
}
function gotoOccurrence(idx) {
    if (!state.occurrences.length) return;
    state.matchCursor = (idx + state.occurrences.length) % state.occurrences.length;
    const occ = state.occurrences[state.matchCursor];
    const row = goToSeq(occ.seq, false);
    if (row) {
        document.querySelectorAll('mark.cur').forEach(m => m.classList.remove('cur'));
        // Raw-text occurrence index can exceed the rendered <mark> count (markdown
        // changes the text), so fall back to the first mark rather than nothing.
        const marks = row.querySelectorAll('mark');
        const mk = marks[occ.n] || marks[0];
        if (mk) mk.classList.add('cur');
    }
    updateMatchNav();
}

// ── Header stats ────────────────────────────────────────────────────────────
function sessionDuration() {
    const r = state.records;
    if (r.length < 2 || !r[0].ts_iso || !r[r.length - 1].ts_iso) return '—';
    const ms = new Date(r[r.length - 1].ts_iso) - new Date(r[0].ts_iso);
    return ms > 0 ? fmtDur(ms) : '—';
}
function totalToolCalls() {
    return state.records.reduce((s, r) => s + (r.role === 'tools' && r.tools ? r.tools.length : 0), 0);
}
function paintHeader() {
    const m = state.meta;
    document.getElementById('title').firstChild.textContent = (m.ai_title || 'Transcript') + ' ';
    document.getElementById('sid').textContent = (m.session_id || '').slice(0, 8);
    const tk = m.tokens || {};
    // Split the bar on input-vs-output (the meaningful ratio). Cache reads dwarf
    // both by orders of magnitude, so it would flatten the split — keep it in the
    // legend, not as a competing segment.
    const inT = tk.input || 0, outT = tk.output || 0, cacheT = tk.cache_read || 0, split = inT + outT || 1;
    const idline = [shortModel(m.model), m.git_branch ? 'on ' + m.git_branch : '', m.permission_mode || ''].filter(Boolean).join('  ·  ');
    document.getElementById('masthead').innerHTML = `
        <div class="mh-id">${esc(idline)}</div>
        <div class="mh-bar" title="${fmtTokens(inT)} in · ${fmtTokens(outT)} out · ${fmtTokens(cacheT)} cache read">
            <span class="mh-seg in" style="width:${inT / split * 100}%"></span>
            <span class="mh-seg out" style="width:${outT / split * 100}%"></span>
        </div>
        <div class="mh-legend"><span class="in">↓ ${fmtTokens(inT)} in</span><span class="out">↑ ${fmtTokens(outT)} out</span><span class="cache">${fmtTokens(cacheT)} cache</span></div>
        <div class="mh-stats">
            <span class="mh-tile"><b>${totalToolCalls()}</b> tool calls</span>
            <span class="mh-tile"><b>${m.subagent_count || 0}</b> sub-agents</span>
            <span class="mh-tile"><b>${sessionDuration()}</b> active</span>
        </div>`;
    document.getElementById('masthead').hidden = false;
}

// ── Ingest a /data payload ──────────────────────────────────────────────────
function ingest(data) {
    state.meta = data.meta;
    let added = 0, changed = false;
    for (const r of data.records) {
        r._search = null;
        const prev = state.bySeq.get(r.seq);
        if (prev) {
            // A trailing record (e.g. a tools group still accumulating calls
            // while Claude runs) mutates between polls — replace it in place
            // rather than skip it, or the growing card would never update.
            const idx = state.records.indexOf(prev);
            if (idx >= 0) state.records[idx] = r;
            state.bySeq.set(r.seq, r);
            changed = true;
        } else {
            state.bySeq.set(r.seq, r); state.records.push(r); added++;
        }
        state.lastSeq = Math.max(state.lastSeq, r.seq);
    }
    if (added) state.records.sort((a, b) => a.seq - b.seq);
    paintHeader();
    return { added, changed };
}

// ── Controls ────────────────────────────────────────────────────────────────
const q = document.getElementById('q');
q.value = sessionStorage.getItem(SS.q) || '';
let searchTimer = null;
q.addEventListener('input', () => {
    sessionStorage.setItem(SS.q, q.value);
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => runSearch(q.value.trim().toLowerCase()), 180);
});
q.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); gotoOccurrence(state.matchCursor + (e.shiftKey ? -1 : 1)); document.getElementById('searchResults').hidden = true; }
    else if (e.key === 'Escape') { document.getElementById('searchResults').hidden = true; q.blur(); }
});
// ── Search jump-palette: tap a block to jump there; empty query lists all ─────
const srPanel = document.getElementById('searchResults');
const SR_LABEL = { user: 'You', assistant: 'Claude', tools: 'Tools', event: 'Event' };
function rawText(r) {
    if (r.role === 'user' || r.role === 'assistant') return r.text || '';
    if (r.role === 'tools') return (r.tools || []).map(x => x.name + ' ' + (x.preview || '')).join(' · ');
    if (r.role === 'event') return r.text || '';
    return '';
}
function resultSnippet(r, term) {
    const raw = rawText(r);
    if (!term) return snippet(raw);
    const i = raw.toLowerCase().indexOf(term);
    return i < 0 ? snippet(raw) : (i > 20 ? '… ' : '') + snippet(raw.slice(Math.max(0, i - 20)));
}
function buildResults() {
    const recs = state.term
        ? (s => state.records.filter(r => s.has(r.seq)))(new Set(state.matches.map(m => m.seq)))
        : state.records;
    if (!recs.length) { srPanel.innerHTML = `<div class="sr-empty">${state.term ? 'No matches' : 'No blocks yet'}</div>`; return; }
    const cap = 60;
    srPanel.innerHTML = recs.slice(0, cap).map(r =>
        `<button class="sr-item" data-seq="${r.seq}"><span class="sr-role role-${r.role}">${SR_LABEL[r.role] || r.role}</span><span class="sr-snip">${esc(resultSnippet(r, state.term))}</span><span class="sr-ts">${esc(r.ts || '')}</span></button>`
    ).join('') + (recs.length > cap ? `<div class="sr-more">${recs.length - cap} more — refine your search</div>` : '');
}
q.addEventListener('focus', () => { buildResults(); srPanel.hidden = false; });
q.addEventListener('blur', () => setTimeout(() => { srPanel.hidden = true; }, 200));
srPanel.addEventListener('click', e => {
    const it = e.target.closest('.sr-item'); if (!it) return;
    goToSeq(parseInt(it.dataset.seq, 10)); srPanel.hidden = true;
});
document.getElementById('nextMatch').addEventListener('click', () => gotoOccurrence(state.matchCursor + 1));
document.getElementById('prevMatch').addEventListener('click', () => gotoOccurrence(state.matchCursor - 1));
document.getElementById('chips').querySelectorAll('.chip').forEach(chip => {
    chip.setAttribute('aria-pressed', state.enabledRoles.has(chip.dataset.role) ? 'true' : 'false');
    chip.addEventListener('click', () => {
        const role = chip.dataset.role;
        state.enabledRoles.has(role) ? state.enabledRoles.delete(role) : state.enabledRoles.add(role);
        chip.setAttribute('aria-pressed', state.enabledRoles.has(role) ? 'true' : 'false');
        localStorage.setItem(SS.roles, JSON.stringify([...state.enabledRoles]));
        if (state.term) runSearch(state.term); else renderPage();
    });
});

// ── Keyboard paging (ignored while typing in a field) ───────────────────────
document.addEventListener('keydown', e => {
    const tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'select' || tag === 'textarea' || e.metaKey || e.ctrlKey) return;
    const pc = pageCount();
    if (e.key === 'ArrowLeft' || e.key === '[') { e.preventDefault(); gotoPage(state.page - 1); }
    else if (e.key === 'ArrowRight' || e.key === ']') { e.preventDefault(); gotoPage(state.page + 1); }
    else if (e.key === 'Home') { e.preventDefault(); gotoPage(0); }
    else if (e.key === 'End') { e.preventDefault(); gotoPage(pc - 1); }
});

// ── Live polling: append only what's new ────────────────────────────────────
const liveDot = document.getElementById('liveDot'), liveLabel = document.getElementById('liveLabel');
async function poll(initial) {
    try {
        // Re-pull from one before the last seq so a still-growing trailing record
        // (an unflushed tools group) is re-sent and refreshed, not missed.
        const since = Math.max(0, state.lastSeq - 1);
        const res = await fetch(initial ? API + 'data' : API + 'data?since=' + since, { cache: 'no-store' });
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        const { added, changed } = ingest(data);
        if (initial) {
            state.page = pageCount() - 1;                 // open on newest activity
            const saved = parseInt(localStorage.getItem(SS.page) || '-1', 10);
            if (saved >= 0 && saved < pageCount()) state.page = saved;
            state.pageWasLast = state.page === pageCount() - 1;
            renderPage();
            if (q.value) runSearch(q.value.trim().toLowerCase());
        } else if (added || changed) {
            if (state.term) {
                refreshMatches();                         // keep counts honest, don't move the view
                if (state.pageWasLast) renderPage();      // but do refresh a growing card if it's on screen
            } else if (atNewest()) {
                gotoPage(pageCount() - 1, false);         // at the live edge → follow the newest block
            } else {
                if (added) state.newCount += added;       // scrolled away → count it, don't yank the view
                renderPager(); renderTimeline(); updateJump();
            }
        }
        liveDot.classList.remove('stale'); liveLabel.textContent = 'live';
    } catch (e) { liveDot.classList.add('stale'); liveLabel.textContent = 'offline'; }
}

// ── Jump-to-latest floating button ──────────────────────────────────────────
// Appears whenever you're not already at the newest block (older page, or
// scrolled up). One tap returns to the live edge — handy on long transcripts
// and while live-tailing.
function atNewest() {
    if (state.page < pageCount() - 1) return false;
    return (window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 90;
}
function updateJump() {
    const btn = document.getElementById('jumpLatest'), show = !atNewest();
    if (!show) state.newCount = 0;
    btn.classList.toggle('show', show);
    btn.textContent = (show && state.newCount > 0) ? `${state.newCount} new ↓` : '↓ latest';
}
document.getElementById('jumpLatest').addEventListener('click', () => {
    if (state.page !== pageCount() - 1) gotoPage(pageCount() - 1, false);
    requestAnimationFrame(() => window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' }));
});
window.addEventListener('scroll', updateJump, { passive: true });

// On a phone the ribbon would bury the conversation under a wall of dots, so
// start it collapsed there; its summary still reports the block count, and a
// tap expands it. Desktop keeps it open.
if (window.matchMedia('(max-width: 760px)').matches) document.getElementById('timeline').removeAttribute('open');

poll(true);
setInterval(() => poll(false), 8000);
</script>
</body>
</html>
