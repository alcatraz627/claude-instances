<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Session Transcript — handoff reference</title>
<style>
/* ============================================================ V3 "CHAPTERS"
   Conviction: a session is a story of your asks; skim is the primary job.
   Your prompts are chapter titles. Claude's prose flows beneath them. All the
   work between prompts folds into one activity-ledger line per run. The
   overview is an outline (sidebar/drawer) + a segmented progress spine.
   Register: editorial reader in the dark house palette — serif display,
   big prose, quiet dense chrome. */
:root {
    color-scheme: dark;
    --bg: #191a21; --bg2: #21232c; --well: #1d1f27; --sel: #2b2d38;
    --edge: rgba(200,205,225,.13); --edge2: rgba(200,205,225,.24);
    --text: #edeef4; --dim: #a2a7b8; --faint: #676d80;
    --you: oklch(0.76 0.15 268); --claude: oklch(0.76 0.14 180);
    --tool: #e2b05b; --err: #ea8578; --add: oklch(0.75 0.14 142); --del: #ea8578;
    --meta: oklch(0.74 0.11 305);   /* violet — git/meta hint only */
    --mark: rgba(226,176,91,.3);
    --you-soft: color-mix(in srgb, var(--you) 10%, transparent);
    --you-ring: color-mix(in srgb, var(--you) 40%, transparent);
    --claude-soft: color-mix(in srgb, var(--claude) 12%, transparent);
    --tool-soft: color-mix(in srgb, var(--tool) 12%, transparent);
    --err-soft: color-mix(in srgb, var(--err) 10%, transparent);
    --sans: ui-sans-serif, -apple-system, "Segoe UI", sans-serif;
    --serif: ui-serif, Georgia, "Iowan Old Style", "Times New Roman", serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --fs-prose: 15.5px; --lh-prose: 1.68; --measure: 640px;
    --r: 8px; --tb-h: 44px;
    --ease: cubic-bezier(.2,0,0,1); --t-fast: 130ms; --t-slow: 260ms;
    --shadow: 0 10px 32px -12px rgba(0,0,0,.6);
}
:root.light {
    color-scheme: light;
    --bg: #faf9f6; --bg2: #f1efe9; --well: #f4f2ed; --sel: #e8e5dd;
    --edge: rgba(35,32,24,.13); --edge2: rgba(35,32,24,.26);
    --text: #1e1f24; --dim: #565b68; --faint: #8e93a1;
    --you: oklch(0.46 0.16 268); --claude: oklch(0.46 0.15 180);
    --tool: #7e5d0e; --err: #b23f33; --add: oklch(0.46 0.14 142); --del: #b23f33;
    --meta: oklch(0.46 0.13 305);
    --mark: rgba(216,160,32,.32);
    --shadow: 0 10px 32px -12px rgba(40,36,20,.24);
}
* { box-sizing: border-box; }
html { scroll-padding-top: calc(var(--tb-h) + 14px); }
body { margin: 0; background: var(--bg); color: var(--text); font: var(--fs-prose)/var(--lh-prose) var(--sans); }
button { font: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
:focus-visible { outline: 2px solid var(--you); outline-offset: 2px; }
:focus:not(:focus-visible) { outline: none; }
.icon { width: 15px; height: 15px; stroke: currentColor; stroke-width: 1.75;
    stroke-linecap: round; stroke-linejoin: round; fill: none; flex: none; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }

/* ================= sticky top bar */
.topbar { position: fixed; top: 0; left: 0; right: 0; height: var(--tb-h); z-index: 60;
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    background: color-mix(in srgb, var(--bg) 90%, transparent); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--edge); }
.tb-back { display: inline-flex; align-items: center; gap: 4px; color: var(--dim); text-decoration: none;
    font: 600 12.5px var(--sans); padding: 6px 8px; border-radius: var(--r); white-space: nowrap; }
.tb-back:hover { background: var(--sel); color: var(--text); }
.tb-title { font: 600 13px var(--serif); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    opacity: 0; transition: opacity var(--t-slow) var(--ease); cursor: pointer; min-width: 0; }
.tb-ch { flex: none; font: 700 10.5px var(--mono); color: var(--faint); opacity: 0;
    transition: opacity var(--t-slow) var(--ease); white-space: nowrap; }
.topbar.scrolled .tb-title, .topbar.scrolled .tb-ch { opacity: 1; }
.tb-live { flex: none; display: inline-flex; align-items: center; gap: 6px;
    font: 700 10.5px var(--mono); letter-spacing: .07em; text-transform: uppercase; color: var(--claude); }
.tb-live.yourturn { color: var(--you); }
.tb-live .pulse { width: 7px; height: 7px; border-radius: 50%; background: currentColor; position: relative; }
.tb-live.working .pulse::after { content: ''; position: absolute; inset: -4px; border-radius: 50%;
    border: 1.5px solid currentColor; opacity: 0; animation: pulse 2s var(--ease) infinite; }
@keyframes pulse { 0% { transform: scale(.4); opacity: .8; } 70%,100% { transform: scale(1.1); opacity: 0; } }
.tb-sp { flex: 1; min-width: 0; }
.tbtn { height: 30px; display: inline-flex; align-items: center; gap: 6px; padding: 0 11px;
    border: 1px solid var(--edge); border-radius: 999px; background: transparent; color: var(--dim);
    font: 600 12px var(--sans); white-space: nowrap;
    transition: all var(--t-fast) var(--ease); }
.tbtn:hover { background: var(--sel); color: var(--text); border-color: var(--edge2); }
.tbtn[aria-pressed="true"] { color: var(--you); border-color: var(--you); background: var(--you-soft); }
.tbtn .lb { display: none; } @media (min-width: 640px) { .tbtn .lb { display: inline; } }

/* ================= layout: outline sidebar + reading column */
.layout { display: flex; max-width: 1220px; margin: 0 auto; padding-top: var(--tb-h); }
.outline { width: 280px; flex: none; position: sticky; top: var(--tb-h); align-self: flex-start;
    max-height: calc(100vh - var(--tb-h)); overflow-y: auto; overscroll-behavior: contain;
    padding: 22px 8px 40px 16px; }
.ol-cap { font: 700 10.5px var(--mono); letter-spacing: .12em; text-transform: uppercase;
    color: var(--faint); padding: 0 10px 8px; }
.ol-item { display: flex; gap: 10px; width: 100%; text-align: left; background: none; border: none;
    border-radius: var(--r); padding: 7px 10px; color: var(--dim); align-items: baseline;
    transition: background var(--t-fast) var(--ease); }
.ol-item:hover { background: var(--sel); color: var(--text); }
.ol-item.cur { background: var(--you-soft); color: var(--text); box-shadow: inset 2px 0 0 var(--you); }
.ol-num { flex: none; font: 700 10.5px var(--mono); color: var(--faint); width: 2ch; padding-top: 3px; }
.ol-item.cur .ol-num { color: var(--you); }
.ol-t { min-width: 0; }
.ol-title { font: 600 12.5px var(--sans); line-height: 1.4; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.ol-meta { font: 10.5px var(--mono); color: var(--faint); margin-top: 1px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
.ol-meta .e { color: var(--err); font-weight: 700; }
@media (max-width: 1099px) {
    .outline { position: fixed; left: 0; top: var(--tb-h); bottom: 0; z-index: 70; background: var(--bg);
        border-right: 1px solid var(--edge2); box-shadow: var(--shadow); translate: -100% 0;
        transition: translate var(--t-slow) var(--ease); max-height: none; width: min(320px, 86vw); }
    .outline.open { translate: 0 0; }
    .scrim { position: fixed; inset: var(--tb-h) 0 0 0; z-index: 65; background: rgba(0,0,0,.4);
        opacity: 0; pointer-events: none; transition: opacity var(--t-slow) var(--ease); }
    .scrim.on { opacity: 1; pointer-events: auto; }
}
@media (min-width: 1100px) { .scrim { display: none; } }
main { flex: 1; min-width: 0; padding: 0 20px 30vh; }
.colwrap { max-width: var(--measure); margin: 0 auto; }

/* ================= masthead — the title page */
.masthead { padding: 44px 0 8px; }
.mh-kicker { font: 700 10.5px var(--mono); letter-spacing: .14em; text-transform: uppercase; color: var(--faint); }
.mh-kicker .live { color: var(--claude); }
.mh-title { font: 600 clamp(22px, 4.6vw, 30px)/1.22 var(--serif); letter-spacing: -.012em;
    margin: 10px 0 12px; text-wrap: balance; }
.mh-byline { font: 12px var(--mono); color: var(--dim); display: flex; flex-wrap: wrap; gap: 5px 16px; }
.mh-byline .bi { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.mh-byline .icon { width: 12.5px; height: 12.5px; color: var(--faint); }
/* hint colours on session identity — icon + a whisper on the value */
.bi.model .icon { color: var(--claude); } .bi.model { color: color-mix(in srgb, var(--claude) 45%, var(--dim)); }
.bi.branch .icon { color: var(--meta); } .bi.branch { color: color-mix(in srgb, var(--meta) 40%, var(--dim)); }
.bi.perm .icon { color: var(--tool); } .bi.perm { color: color-mix(in srgb, var(--tool) 45%, var(--dim)); }
.mh-colophon { margin-top: 16px; padding: 10px 0; border-top: 1px solid var(--edge); border-bottom: 1px solid var(--edge);
    font: 12px var(--mono); font-variant-numeric: tabular-nums; color: var(--dim);
    display: flex; flex-wrap: wrap; gap: 4px 18px; }
.mh-colophon b { color: var(--text); font-weight: 700; }
.mh-colophon .in b { color: var(--you); } .mh-colophon .out b { color: var(--claude); }
/* progress spine — one segment per chapter */
.spine { display: flex; gap: 3px; margin-top: 12px; height: 6px; }
.spine span { flex: 1; border-radius: 3px; background: var(--sel); cursor: pointer; position: relative;
    transition: background var(--t-fast) var(--ease); min-width: 4px; }
.spine span:hover { background: var(--edge2); }
.spine span.done { background: color-mix(in srgb, var(--you) 45%, var(--sel)); }
.spine span.cur { background: var(--you); }
.spine span.err::after { content: ''; position: absolute; top: -3px; right: 0; width: 4px; height: 4px;
    border-radius: 50%; background: var(--err); }
.spine-cap { display: flex; justify-content: space-between; font: 10.5px var(--mono); color: var(--faint); margin-top: 5px; }

/* ================= chapters */
.chapter { margin-top: 22px; }
.ch-head { display: flex; gap: 14px; padding-top: 26px; border-top: 1px solid var(--edge);
    scroll-margin-top: calc(var(--tb-h) + 10px); }
.chapter:first-of-type .ch-head { border-top: none; padding-top: 8px; }
.ch-num { flex: none; font: 700 11px var(--mono); color: var(--you); padding-top: 7px; width: 2.5ch; }
.ch-body { min-width: 0; flex: 1; }
.ch-title { font: 600 19px/1.35 var(--serif); letter-spacing: -.008em; margin: 0; text-wrap: pretty; cursor: pointer; }
.ch-title:hover { color: var(--you); }
.ch-meta { font: 11px var(--mono); color: var(--faint); margin-top: 5px; display: flex; flex-wrap: wrap; gap: 3px 14px; }
.ch-meta .e { color: var(--err); font-weight: 700; }
.cmdchip { display: inline-flex; align-items: center; gap: 6px; font: 700 12px var(--mono);
    color: var(--you); background: var(--you-soft); border-radius: 5px; padding: 2px 9px; margin-bottom: 6px; }
.cmdchip::before { content: '❯'; opacity: .6; }
/* long prompt body = clamped epigraph */
.epi { position: relative; margin: 12px 0 0; padding: 2px 0 2px 16px; border-left: 2px solid var(--you);
    color: var(--dim); font-size: 14px; }
.epi .content { color: var(--dim); font-size: 14px; }
.epi.clamped .epi-in { max-height: 7.2em; overflow: hidden;
    -webkit-mask-image: linear-gradient(#000 55%, transparent); mask-image: linear-gradient(#000 55%, transparent); }
.epi-more { background: none; border: none; color: var(--you); font: 600 12px var(--sans); padding: 2px 0; }
.epi-more:hover { text-decoration: underline; }

/* claude passages */
.passage { margin-top: 20px; }
.byline { display: flex; align-items: baseline; gap: 8px; font: 11px var(--mono); color: var(--faint);
    margin-bottom: 4px; }
.byline .who { color: var(--claude); font-weight: 700; letter-spacing: .05em; text-transform: uppercase; font-size: 10.5px; }
.byline .hgap { flex: 1; }
.byline .cp { background: none; border: none; color: var(--faint); font: 11px var(--mono); opacity: 0; padding: 0 4px; }
.passage:hover .cp { opacity: 1; } .cp:hover { color: var(--text); } .cp.ok { color: var(--add); opacity: 1; }
.content { overflow-wrap: break-word; }
.content > :first-child { margin-top: 0; } .content > :last-child { margin-bottom: 0; }
.content p, .content ul, .content ol { margin: 10px 0; }
.content h1, .content h2 { font: 600 17px/1.4 var(--serif); margin: 22px 0 8px; }
.content h3, .content h4 { font: 600 15.5px/1.4 var(--sans); margin: 18px 0 6px; }
.content a { color: var(--you); text-decoration-color: color-mix(in srgb, var(--you) 40%, transparent); }
.content code { font: 13px var(--mono); background: var(--bg2); border-radius: 4px; padding: 1.5px 5px; }
.content pre { background: var(--well); border: 1px solid var(--edge); border-radius: var(--r);
    padding: 12px 14px; overflow-x: auto; font-size: 13px; line-height: 1.6; }
.content pre code { background: none; padding: 0; font-size: inherit; }
.content blockquote { margin: 10px 0; padding: 2px 16px; border-left: 2px solid var(--edge2); color: var(--dim); }
.content table { border-collapse: collapse; font-size: 13.5px; display: block; overflow-x: auto; }
.content th, .content td { border: 1px solid var(--edge); padding: 4px 10px; text-align: left; }
.content mark { background: var(--mark); color: inherit; border-radius: 2px; }

/* ================= activity ledger */
.ledger { margin-top: 14px; border: 1px solid var(--edge); border-radius: var(--r); background: var(--well);
    overflow: hidden; }
.lg-row { display: flex; align-items: center; gap: 9px; width: 100%; min-height: 38px; padding: 5px 12px;
    background: none; border: none; text-align: left; color: var(--dim); font: 12px var(--mono);
    transition: background var(--t-fast) var(--ease); }
.lg-row:hover { background: var(--sel); }
.lg-ico { width: 22px; height: 22px; flex: none; display: inline-flex; align-items: center; justify-content: center;
    border-radius: 6px; background: var(--tool-soft); color: var(--tool); }
.lg-ico .icon { width: 13px; height: 13px; }
.lg-sum { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lg-sum b { color: var(--text); font-weight: 700; }
.lg-sum .e { color: var(--err); font-weight: 700; }
.lg-chev { flex: none; color: var(--faint); transition: transform var(--t-fast) var(--ease); }
.lg-row[aria-expanded="true"] .lg-chev { transform: rotate(90deg); }
.lg-body { border-top: 1px solid var(--edge); padding: 5px 8px 7px; }
/* rows inside a ledger */
.trow { display: flex; align-items: center; gap: 8px; width: 100%; min-height: 30px; padding: 2px 6px;
    background: none; border: none; border-radius: 6px; color: var(--dim); text-align: left;
    font: 12px var(--mono); transition: background var(--t-fast) var(--ease); }
.trow:hover { background: var(--sel); }
.trow .fold { flex: none; width: 2ch; color: var(--faint); text-align: center;
    transition: transform var(--t-fast) var(--ease); }
.trow[aria-expanded="true"] .fold { transform: rotate(90deg); }
.trow .tn { font-weight: 700; color: var(--tool); flex: none; }
.trow.agent .tn { color: var(--claude); }
.trow .tp { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.trow .tp .pdir { color: var(--faint); } .trow .tp .pbase { color: var(--text); font-weight: 600; }
.trow .tk { flex: none; color: var(--faint); font-size: 10.5px; }
.evrow { display: flex; align-items: baseline; gap: 8px; padding: 2px 8px; font: 11.5px var(--mono); color: var(--faint); }
.evrow.err { color: var(--err); }
.evrow .ts { margin-left: auto; font-size: 10.5px; }
.tbody { margin: 3px 4px 8px 30px; border: 1px solid var(--edge); border-radius: 6px;
    background: var(--bg2); overflow: hidden; }
.tb-scroll { max-height: 360px; overflow: auto; overscroll-behavior: contain; padding: 9px 12px;
    font: 12.5px/1.6 var(--mono); }
.dl { white-space: pre-wrap; word-break: break-all; }
.dl.add { color: var(--add); } .dl.del { color: var(--del); } .dl.ctx { color: var(--faint); }
.cmdline { white-space: pre-wrap; word-break: break-all; }
.cmdline .ps { color: var(--claude); font-weight: 700; }
.cap { color: var(--faint); font-size: 11px; margin: 3px 0; }
.todos div { display: flex; gap: 1ch; }
.todos .done { color: var(--faint); text-decoration: line-through; }
.todos .done .box { color: var(--add); text-decoration: none; }
.todos .active { color: var(--text); font-weight: 700; } .todos .active .box { color: var(--claude); }
.todos .pending { color: var(--dim); }
.jsonpre { margin: 0; color: var(--dim); white-space: pre-wrap; word-break: break-all; }
.nested { margin: 2px 0; padding-left: 12px; border-left: 2px dashed color-mix(in srgb, var(--claude) 45%, transparent); }
.nested .note { color: var(--faint); font-size: 11px; margin: 4px 0 6px; font-family: var(--mono); }
.nested .passage { margin-top: 10px; }
.nested .content { font: 13.5px/1.62 var(--sans); }
.nested .uq { margin: 10px 0 0; padding-left: 12px; border-left: 2px solid var(--you); color: var(--dim); font: 13.5px/1.62 var(--sans); }
/* injected user content (command expansions, skill preambles) — an annotation, not a chapter */
.injected { margin: 12px 0 0; }
.inj-row { display: flex; align-items: center; gap: 8px; font: 11.5px var(--mono); color: var(--faint);
    background: none; border: none; padding: 2px 0; text-align: left; }
.inj-row:hover { color: var(--dim); }
.inj-row .fold { width: 12px; flex: none; }
.inj-body { margin: 6px 0 0 20px; padding: 8px 14px; border-left: 2px dashed var(--edge2); color: var(--dim); }
.inj-body .content { font-size: 13.5px; }
/* standalone event line (mode changes stay visible outside the ledger fold) */
.evline { display: flex; align-items: baseline; gap: 8px; margin: 12px 0 0; font: 11.5px var(--mono); color: var(--dim); }
.evline::before { content: '·'; color: var(--tool); }
.evline .ts { margin-left: auto; color: var(--faint); font-size: 10.5px; }
.evline.err { color: var(--err); }
.evline.err::before { content: '▲'; color: var(--err); }

/* dividers between chapters (day / idle) */
.divider { display: flex; align-items: center; gap: 12px; margin: 30px 0 0;
    font: 700 10.5px var(--mono); letter-spacing: .12em; text-transform: uppercase; color: var(--faint); }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--edge); }
.divider.day { color: var(--dim); }
/* live */
.newmark { display: flex; align-items: center; gap: 10px; margin: 18px 0 0;
    font: 700 10.5px var(--mono); letter-spacing: .14em; text-transform: uppercase; color: var(--tool);
    transition: opacity 1.2s var(--ease); }
.newmark::before, .newmark::after { content: ''; flex: 1; height: 1px;
    background: color-mix(in srgb, var(--tool) 45%, transparent); }
.fresh { animation: fresh var(--t-slow) var(--ease); }
@keyframes fresh { from { opacity: 0; translate: 0 6px; } }
.flash { animation: flash 1.1s var(--ease); border-radius: var(--r); }
@keyframes flash { 30% { box-shadow: 0 0 0 3px var(--you-ring); } }
.endcap { display: flex; align-items: center; gap: 10px; margin: 40px 0 8px;
    font: 10.5px var(--mono); letter-spacing: .1em; text-transform: uppercase; color: var(--faint); }
.endcap::before, .endcap::after { content: ''; flex: 1; height: 1px; background: var(--edge); }

/* ================= bottom chapter bar */
.chbar { position: fixed; bottom: 14px; left: 50%; translate: -50% 0; z-index: 55;
    display: inline-flex; align-items: center; gap: 2px; padding: 3px;
    background: color-mix(in srgb, var(--bg2) 94%, transparent); backdrop-filter: blur(8px);
    border: 1px solid var(--edge2); border-radius: 999px; box-shadow: var(--shadow); max-width: min(92vw, 480px); }
.chbar button { width: 34px; height: 34px; border-radius: 50%; border: none; background: transparent;
    color: var(--dim); display: inline-flex; align-items: center; justify-content: center; }
.chbar button:hover:not(:disabled) { background: var(--sel); color: var(--text); }
.chbar button:disabled { opacity: .3; cursor: default; }
.chbar .lab { font: 600 12px var(--sans); color: var(--dim); padding: 0 8px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.chbar .lab b { color: var(--text); font-family: var(--mono); font-weight: 700; }
.jumpnew { position: fixed; bottom: 64px; left: 50%; translate: -50% 0; z-index: 55; display: none;
    align-items: center; gap: 6px; height: 32px; padding: 0 14px; border: none; border-radius: 999px;
    background: var(--you); color: #fff; font: 700 12.5px var(--sans); box-shadow: var(--shadow); }
.jumpnew.on { display: inline-flex; animation: fresh var(--t-slow) var(--ease); }

/* ================= search modal */
.smodal { position: fixed; inset: 0; z-index: 80; display: none; align-items: flex-start; justify-content: center;
    padding: max(10vh, 60px) 16px 0; background: rgba(0,0,0,.45); }
.smodal.open { display: flex; }
.spanel { width: min(600px, 100%); background: var(--bg2); border: 1px solid var(--edge2);
    border-radius: 14px; box-shadow: var(--shadow); overflow: hidden;
    animation: fresh var(--t-fast) var(--ease); }
.srow { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--edge); }
.srow .icon { color: var(--faint); }
.srow input { flex: 1; background: none; border: none; color: var(--text); font: 15px var(--sans); min-width: 0; }
.srow input:focus { outline: none; }
.srow .kbd { font: 10.5px var(--mono); color: var(--faint); border: 1px solid var(--edge); border-radius: 4px; padding: 1px 6px; }

        const txt = searchable(r); const i = txt.toLowerCase().indexOf(q);
        return i < 0 ? null : { r, txt, i };
    }).filter(Boolean);
    state.hitIdx = 0;
    renderHits();
}
function renderHits() {
    const list = $('#slist');
    $('#sCount').textContent = `${state.hits.length} matches`;
    if (!state.term) { list.innerHTML = `<div class="sempty">type to search the whole session</div>`; return; }
    if (!state.hits.length) { list.innerHTML = `<div class="sempty">no matches</div>`; return; }
    list.innerHTML = state.hits.slice(0, 80).map((h, n) => {
        const start = Math.max(0, h.i - 24);
        const snip = (start > 0 ? '…' : '') + esc(h.txt.slice(start, h.i)) +
            `<mark>${esc(h.txt.slice(h.i, h.i + state.term.length))}</mark>` + esc(h.txt.slice(h.i + state.term.length, h.i + 84));
        const tag = h.r.role === 'user' ? 'YOU' : h.r.role === 'assistant' ? 'CL' : h.r.role === 'tools' ? 'TL' : 'EV';
        return `<div class="shit${n === state.hitIdx ? ' cur' : ''}" data-n="${n}">` +
            `<span class="tag r-${h.r.role}">${tag}</span><span class="snip">${snip}</span>` +
            `<span class="sts">${esc(h.r.ts || '')}</span></div>`;
    }).join('');
    const cur = list.querySelector('.cur');
    if (cur) {
        const lt = list.scrollTop, lb = lt + list.clientHeight;
        if (cur.offsetTop < lt) list.scrollTop = cur.offsetTop - 6;
        else if (cur.offsetTop + cur.offsetHeight > lb) list.scrollTop = cur.offsetTop + cur.offsetHeight - list.clientHeight + 6;
    }
}
function openFind() { $('#smodal').classList.add('open'); renderHits(); $('#q').focus(); }
function closeFind() { $('#smodal').classList.remove('open'); }
function hitJump(n) { const h = state.hits[n]; if (!h) return; closeFind(); jumpToSeq(h.r.seq); }
$('#findBtn').onclick = openFind;
$('#smodal').addEventListener('click', e => { if (e.target === $('#smodal')) closeFind(); });
$('#q').addEventListener('input', e => runSearch(e.target.value.trim()));
$('#q').addEventListener('keydown', e => {
    if (e.key === 'ArrowDown') { e.preventDefault(); state.hitIdx = Math.min(state.hitIdx + 1, state.hits.length - 1); renderHits(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); state.hitIdx = Math.max(state.hitIdx - 1, 0); renderHits(); }
    else if (e.key === 'Enter') { e.preventDefault(); hitJump(state.hitIdx); }
    else if (e.key === 'Escape') closeFind();
});
$('#slist').addEventListener('click', e => { const row = e.target.closest('.shit'); if (row) hitJump(+row.dataset.n); });
document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openFind(); return; }
    if (e.target.matches('input,select,textarea')) return;
    if (e.key === '/') { e.preventDefault(); openFind(); }
    else if (e.key === 'Escape') { closeFind(); closeOutline(); }
    else if (e.key === '[') $('#chPrev').click();
    else if (e.key === ']') $('#chNext').click();
});

/* ================= live — poll /data?since=<lastSeq> and append in place */
let liveTimer = null, lastSeq = 0, quietPolls = 0, pollBusy = false;
function setLiveState(kind) {
    const el = $('#tbLive');
    el.className = 'tb-live ' + (kind === 'working' ? 'working' : kind === 'yourturn' ? 'yourturn' : '');
    $('#tbLiveLb').textContent = kind === 'working' ? 'working' : kind === 'yourturn' ? 'your turn' : 'ended';
}
function ingestNew(recs) {
    const atBottom = innerHeight + scrollY > document.body.scrollHeight - 320;
    if (state.newSince == null && !atBottom) state.newSince = recs[0].seq;
    state.records.push(...recs);
    const prevN = state.chapters.length;
    buildChapters();
    if (state.chapters.length !== prevN) renderChapters();
    else rerenderChapter(state.chapters.length - 1);
    renderOutline(); updateSpine(); renderMasthead();
    for (const rec of recs) {
        const el = document.querySelector(`[data-seq="${rec.seq}"]`);
        if (el) el.classList.add('fresh');
    }
    if (!atBottom && state.newSince != null) {
        const unseen = state.records.filter(r => r.seq >= state.newSince).length;
        $('#jumpNewN').textContent = `${unseen} new`;
        $('#jumpNew').classList.add('on');
    }
    setTimeout(() => { document.querySelectorAll('.newmark').forEach(nm => nm.style.opacity = '0'); }, 5000);
}
async function pollLive() {
    if (document.hidden || pollBusy) return;   // don't stack polls; idle tabs stay quiet
    pollBusy = true;
    try {
        const res = await fetch(API + 'data?since=' + lastSeq, { cache: 'no-store' });
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        state.meta = data.meta; window.SESSION.meta = data.meta;
        if (data.records.length) {
            lastSeq = data.records[data.records.length - 1].seq;
            if (state.mode !== 'normal') {
                state.records.push(...data.records);
                setMode('normal');
            } else ingestNew(data.records);
            quietPolls = 0; setLiveState('working');
        } else if (++quietPolls >= 2 && state.mode === 'normal') setLiveState('yourturn');
    } catch (e) { /* transient poll failure: keep what's on screen, retry next tick */ }
    finally { pollBusy = false; }
}
$('#jumpNew').onclick = () => {
    $('#jumpNew').classList.remove('on'); state.newSince = null;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
};
function startLive() { state.live = true; if (!liveTimer) liveTimer = setInterval(pollLive, 5000); }
function stopLive() { state.live = false; clearInterval(liveTimer); liveTimer = null; }
document.addEventListener('visibilitychange', () => { if (!document.hidden && state.live) pollLive(); });

/* ================= states (demo) */
function setMode(mode) {
    state.mode = mode;
    $('#chapters').innerHTML = '';
    $('#masthead').style.display = (mode === 'loading' || mode === 'error') ? 'none' : '';
    $('#chbar').style.display = mode === 'normal' ? '' : 'none';
    const sw = $('#statewrap'); sw.innerHTML = '';
    if (mode === 'normal') { renderMasthead(); renderChapters(); renderMasthead(); return; }
    if (mode === 'loading') sw.innerHTML =
        `<div style="padding-top:44px">` +
        `<div class="sk" style="height:11px;width:150px"></div>` +
        `<div class="sk" style="height:30px;width:78%;margin-top:14px"></div>` +
        `<div class="sk" style="height:30px;width:52%;margin-top:8px"></div>` +
        `<div class="sk" style="height:12px;width:65%;margin-top:14px"></div>` +
        `<div class="sk" style="height:6px;margin-top:20px;border-radius:3px"></div>` +
        `<div class="sk" style="height:20px;width:85%;margin-top:44px"></div>` +
        `<div class="sk" style="height:14px;width:96%;margin-top:16px"></div>` +
        `<div class="sk" style="height:14px;width:88%;margin-top:8px"></div>` +
        `<div class="sk" style="height:14px;width:92%;margin-top:8px"></div>` +
        `<div class="sk" style="height:40px;margin-top:16px"></div></div>`;
    if (mode === 'error') sw.innerHTML =
        `<div class="errbanner">${ic('alert')}<div class="t"><b>Couldn't load the session</b>` +
        `<span>GET ${esc(API)}data → unreachable · retrying keeps what's on screen</span></div>` +
        `<button onclick="boot()">Retry</button></div>`;
    if (mode === 'empty') sw.innerHTML =
        `<div class="emptycard"><div class="orn">···</div><h2>Nothing written yet</h2>` +
        `<p>The session just started — chapter one appears with your first prompt.</p></div>`;
}
window.setMode = setMode;
$('#themeBtn').onclick = () => applyTheme(document.documentElement.classList.contains('light') ? 'dark' : 'light');
$('#tbTitle').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

/* ================= handoff view controls (theme · palette · direction · text size · timeline) */
const DIRECTIONS = {
    chapters:  { measure: 640, sidebar: true,  toolrow: 'well', timeline: false, hint: 'V3 — editorial reader. Prompts are chapters; work folds into one ledger line per run.' },
    command:   { measure: 720, sidebar: false, toolrow: 'card', timeline: true,  hint: 'V5 — command center. Wider column, tool runs as cards, timeline on, no sidebar.' },
    tty:       { measure: 900, sidebar: false, toolrow: 'bare', timeline: false, hint: 'V2 — terminal. Wide measure, mono display, tool rows bare on a rail (hybrid: prose stays sans).' },
    inspector: { measure: 680, sidebar: true,  toolrow: 'card', timeline: false, hint: 'V1 — inspector. Sidebar nav, denser lines, tool runs as cards.' },
};
const save = (k, v) => { try { localStorage.setItem(k, v); } catch (e) {} };
const load = (k, d) => { try { const v = localStorage.getItem(k); return v == null ? d : v; } catch (e) { return d; } };
function seg(sel, val, attr) {
    document.querySelectorAll(sel + ' button').forEach(b => b.setAttribute('aria-pressed', String(b.dataset[attr] === val)));
}
/* duplicate of the ledger's expanded-rows renderer, used by the card/bare directions */
function ledgerRowsHTML(run) {
    return run.map(r => {
        if (r.role === 'event') {
            const err = r.cls === 'err';
            return `<div class="evrow${err ? ' err' : ''}">${err ? '▲' : '·'} ${esc(r.text)}<span class="ts">${esc(r.ts || '')}</span></div>`;
        }
        return r.tools.map((t, i) => {
            const tkey = r.seq + ':' + i, topen = state.expanded.has(tkey);
            return `<button class="trow${AGENT(t) ? ' agent' : ''}" data-key="${tkey}" aria-expanded="${topen}">` +
                `<span class="fold">${topen ? '▾' : '▸'}</span><span class="tn">${esc(t.name)}</span>` +
                `<span class="tp">${prevHTML(t)}</span>` +
                (t.tokens_out ? `<span class="tk">↑${kfmt(t.tokens_out)}</span>` : '') + `</button>` +
                (topen ? `<div class="tbody"><div class="tb-scroll">${toolBody(t)}</div></div>` : '');
        }).join('');
    }).join('');
}
/* one run of consecutive tools/events, rendered per the active direction's tool-row knob */
function runHTML(run, key) {
    const tr = (state.dir && state.dir.toolrow) || 'well';
    if (tr === 'well') return ledgerHTML(run, key);
    const rows = ledgerRowsHTML(run);
    if (tr === 'bare') return `<div class="bare">${rows}</div>`;
    const nTools = run.reduce((a, r) => a + (r.tools ? r.tools.length : 0), 0);
    const sum = ledgerSummary(run);
    return `<div class="wcard${nTools <= 1 ? ' solo' : ''}">${rows}${nTools <= 1 ? '' : `<div class="wc-foot">${sum.html}</div>`}</div>`;
}
function applyDir(name) {
    const d = DIRECTIONS[name] || DIRECTIONS.chapters;
    state.dir = d; state.dirName = name;
    document.documentElement.dataset.dir = name;
    document.documentElement.style.setProperty('--measure', d.measure + 'px');
    document.body.classList.toggle('no-outline', !d.sidebar);
    const ob = $('#olBtn'); if (ob) ob.style.display = d.sidebar ? '' : 'none';
    if (!d.sidebar) closeOutline();
    setTimeline(d.timeline);
    seg('#vpDir', name, 'dir');
    const hint = $('#vpDirHint'); if (hint) hint.textContent = d.hint;
    save('hx-dir', name);
    if (state.mode === 'normal') renderChapters();
}
function applyPalette(skin) {
    if (skin === 'native') delete document.documentElement.dataset.skin;
    else document.documentElement.dataset.skin = skin;
    seg('#vpSkin', skin, 'skin'); save('cc-skin', skin);
}
function applyTextSize(px) {
    document.documentElement.style.setProperty('--fs-prose', px + 'px');
    const v = $('#vpFsVal'); if (v) v.textContent = px;
    const r = $('#vpFs'); if (r) r.value = px;
    save('hx-fs', px);
}
/* timeline capability — neutral bars, blue prompt ticks, red error ticks, click to jump */
let tlBuilt = false;
function buildTimeline() {
    const rs = window.SESSION.records.filter(r => r.ts_iso);
    if (rs.length < 2) return;
    const t0 = +new Date(rs[0].ts_iso), t1 = +new Date(rs[rs.length - 1].ts_iso), span = Math.max(1, t1 - t0);
    const N = 120, work = new Array(N).fill(0), pr = [], er = [];
    for (const r of rs) {
        const x = (+new Date(r.ts_iso) - t0) / span;
        if (r.role === 'tools') work[Math.min(N - 1, Math.floor(x * N))] += (r.tools || []).length || 1;
        if (r.role === 'user') pr.push(x);
        if (r.cls === 'err' || (r.role === 'tools' && (r.tools || []).some(t => t.is_error))) er.push(x);
    }
    const max = Math.max(...work, 1), W = 1000, H = 46, base = H - 6;
    let bars = '';
    for (let i = 0; i < N; i++) { if (!work[i]) continue;
        const h = 4 + Math.round(Math.log(1 + work[i]) / Math.log(1 + max) * (H - 18));
        bars += `<rect x="${(i / N * W).toFixed(1)}" y="${base - h}" width="${(W / N * .72).toFixed(1)}" height="${h}" rx="1"></rect>`; }
    const pt = pr.map(x => `<line x1="${(x * W).toFixed(1)}" x2="${(x * W).toFixed(1)}" y1="${base + 1}" y2="${base + 5}"></line>`).join('');
    const et = er.map(x => `<line x1="${(x * W).toFixed(1)}" x2="${(x * W).toFixed(1)}" y1="6" y2="12"></line>`).join('');
    const strip = document.createElement('div'); strip.className = 'cctl'; strip.id = 'cctl';
    strip.innerHTML = `<span class="cctl-lb">session timeline — click to jump</span>` +
        `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><g fill="var(--faint)" opacity=".45">${bars}</g>` +
        `<g stroke="var(--you)" stroke-width="2">${pt}</g><g stroke="var(--err)" stroke-width="2">${et}</g></svg>`;
    strip.addEventListener('click', ev => {
        const r = strip.querySelector('svg').getBoundingClientRect();
        const tt = t0 + ((ev.clientX - r.left) / r.width) * span;
        let best = rs[0]; for (const rec of rs) { if (+new Date(rec.ts_iso) <= tt) best = rec; else break; }
        jumpToSeq(best.seq);
    });
    document.body.appendChild(strip);
}
function setTimeline(on) {
    if (on && !tlBuilt) { buildTimeline(); tlBuilt = true; }
    const s = $('#cctl'); if (s) s.classList.toggle('on', on);
    const t = $('#vpTl'); if (t) t.checked = on;
    document.body.classList.toggle('has-tl', on);
}
/* view panel wiring */
$('#viewBtn').onclick = () => { const p = $('#viewPanel'); const o = p.classList.toggle('open'); $('#viewBtn').setAttribute('aria-pressed', String(o)); };
document.addEventListener('click', e => {
    if (!e.target.closest('#viewPanel') && !e.target.closest('#viewBtn')) { $('#viewPanel').classList.remove('open'); $('#viewBtn').setAttribute('aria-pressed', 'false'); }
});
$('#vpDir').onclick = e => { const b = e.target.closest('button'); if (b) applyDir(b.dataset.dir); };
$('#vpSkin').onclick = e => { const b = e.target.closest('button'); if (b) applyPalette(b.dataset.skin); };
$('#vpTheme').onclick = e => { const b = e.target.closest('button'); if (b) applyTheme(b.dataset.theme); };
$('#vpFs').oninput = e => applyTextSize(+e.target.value);
$('#vpTl').onchange = e => setTimeline(e.target.checked);

/* ================= init — fetch the real session, then go live */
applyTheme((() => { try { return localStorage.getItem(SS.theme) || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'); } catch (e) { return 'dark'; } })());
applyDir(load('hx-dir', 'chapters'));
applyPalette(load('cc-skin', 'native'));
applyTextSize(parseFloat(load('hx-fs', '15.5')));
setLiveState('working');
async function boot() {
    setMode('loading');
    try {
        const res = await fetch(API + 'data', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        window.SESSION.meta = data.meta;
        window.SESSION.records = data.records;
        state.meta = data.meta;
        state.records = data.records;
        TITLE = (data.meta.ai_title || '').trim() || 'Claude Code session';
        document.title = TITLE;
        $('#tbTitle').textContent = TITLE;
        lastSeq = data.records.length ? data.records[data.records.length - 1].seq : 0;
        setMode(data.records.length ? 'normal' : 'empty');
        startLive();
    } catch (e) { setMode('error'); }
}
window.boot = boot;
boot();
</script>
